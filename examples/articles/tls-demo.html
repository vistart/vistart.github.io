<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLS / SSL 认证与传输演示</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 24px 20px 48px;
        }
        button { font-family: inherit; cursor: pointer; }
        button:disabled { opacity: .35; cursor: default; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

        .header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: .5px solid #21262d; }
        .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
        .header p { font-size: 13.5px; color: #8b949e; }

        .tabs { display: flex; gap: 4px; border-bottom: .5px solid #21262d; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            font-size: 13px; padding: 8px 14px; cursor: pointer;
            background: transparent; border: none;
            border-bottom: 2px solid transparent;
            color: #8b949e; font-weight: 400; margin-bottom: -0.5px; border-radius: 0;
            transition: all .15s;
        }
        .tab-btn.active { border-color: var(--tab-color,#58a6ff); color: #e6edf3; font-weight: 500; }

        .scenario-selector { margin-bottom: 16px; }
        .scenario-selector .label {
            font-size: 11px; font-weight: 500; color: #8b949e; letter-spacing: .08em;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .scene-btns { display: flex; gap: 8px; flexWrap: wrap; margin-bottom: 10px; }
        .scene-btn {
            font-size: 13px; padding: 7px 16px; border-radius: 8px; cursor: pointer;
            background: #161b22; color: #8b949e;
            border: 1px solid #30363d; font-weight: 400; transition: all .15s;
        }
        .scene-btn.active {
            background: var(--btn-bg); color: var(--btn-color);
            border-color: var(--btn-border); font-weight: 500;
        }
        .scene-btn:hover:not(.active) { border-color: #484f58; }
        .scene-desc {
            font-size: 12.5px; color: #8b949e; padding: 9px 14px;
            border-radius: 8px; background: #161b22; border: .5px solid #21262d;
            border-left: 3px solid var(--desc-color);
        }

        .handshake-view { display: flex; gap: 16px; }
        .handshake-sidebar { width: 200px; flex-shrink: 0; }
        .handshake-sidebar .label {
            font-size: 11px; font-weight: 500; color: #8b949e; letter-spacing: .08em;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .handshake-step {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 5px 8px; border-radius: 6px;
            cursor: pointer; margin-bottom: 2px;
            transition: all .2s;
        }
        .handshake-step.cur { background: var(--step-bg); border: 1px solid var(--step-border); }
        .handshake-step .num {
            width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 500;
        }
        .handshake-step .num.done { background: rgba(8,80,65,.22); color: #3fb950; border: 1px solid #3fb95066; }
        .handshake-step .num.cur { background: var(--num-bg); color: var(--num-color); border: 1px solid var(--num-border); }
        .handshake-step .num.idle { background: #161b22; color: #8b949e; border: 1px solid #30363d; }
        .handshake-step .msg { font-size: 11.5px; line-height: 1.4; }

        .handshake-main { flex: 1; min-width: 0; }
        .hs-header { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .hs-box {
            padding: 10px 12px; border-radius: 10px; text-align: center;
            border: var(--box-border) solid; background: var(--box-bg);
            transition: all .3s;
        }
        .hs-box .emoji { font-size: 20px; margin-bottom: 3px; }
        .hs-box .title { font-size: 13px; font-weight: 500; }
        .hs-box .sub { font-size: 10px; color: #8b949e; font-family: 'JetBrains Mono', monospace; }

        .hs-action {
            padding: 16px 20px; border-radius: 10px;
            border: 1px solid var(--act-border); background: var(--act-bg);
            margin-bottom: 10px; min-height: 72px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: all .3s;
        }
        .hs-action .tag { font-size: 11px; color: #8b949e; margin-bottom: 8px; }
        .hs-action .msg-box {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 18px; border-radius: 20px;
            background: var(--msg-bg); border: 1.5px dashed var(--msg-border);
            color: var(--msg-color); font-size: 12.5px; font-weight: 500;
        }
        .hs-action .done-msg { text-align: center; }
        .hs-action .done-emoji { font-size: 26px; margin-bottom: 4px; }
        .hs-action .done-title { font-size: 13px; font-weight: 500; color: var(--done-color); }
        .hs-arrow-row {
            width: 100%; display: flex; align-items: center;
        }
        .hs-arrow-row.rev { flex-direction: row-reverse; }
        .hs-arrow-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--arr-color); flex-shrink: 0; }
        .hs-arrow-row .line { flex: 1; height: 2.5px; background: var(--arr-color); opacity: 0.7; margin: 0 2px; }
        .hs-arrow-row .tri {
            width: 0; height: 0; flex-shrink: 0;
            border-top: 7px solid transparent; border-bottom: 7px solid transparent;
        }
        .hs-arrow-row .tri.fwd { border-left: 12px solid var(--arr-color); }
        .hs-arrow-row .tri.rev { border-right: 12px solid var(--arr-color); }
        .hs-action .arr-msg { text-align: center; margin-top: 8px; font-size: 13px; font-weight: 500; color: var(--arr-color); }

        .hs-detail {
            padding: 12px 16px; background: #161b22; border: .5px solid #21262d;
            border-radius: 8px; font-size: 12.5px; line-height: 1.85;
            color: #e6edf3; min-height: 80px; margin-bottom: 14px;
            white-space: pre-line;
        }

        .hs-controls { display: flex; gap: 8px; justify-content: center; }
        .hs-ctrl {
            font-size: 12px; padding: 5px 12px; cursor: pointer;
            background: transparent; border: 1px solid #30363d; color: #8b949e;
            border-radius: 6px; transition: all .15s;
        }
        .hs-ctrl:disabled { opacity: .4; cursor: not-allowed; }
        .hs-ctrl.accent { background: var(--accent-bg); color: var(--accent-color); border-color: var(--accent-border); }
        .hs-ctrl.playing { background: #854f0b22; color: #854f0b; border-color: #854f0b88; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .fade-in { animation: fadeIn .3s ease; }

        .pill-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .pill-btn {
            font-size: 12px; padding: 5px 14px; border-radius: 20px;
            background: var(--pill-bg); color: var(--pill-color);
            border: 1px solid var(--pill-border); cursor: pointer;
            font-weight: 500; transition: all .15s;
        }
        .pill-btn.active { background: var(--pill-active-bg); color: var(--pill-active-color); border-color: var(--pill-active-border); }

        .cert-grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1.4fr); gap: 20px; }
        .cert-chain .label {
            font-size: 11px; font-weight: 500; color: #8b949e; letter-spacing: .08em;
            text-transform: uppercase; margin-bottom: 10px;
        }
        .cert-chain-item {
            padding: 9px 14px; border-radius: 8px; text-align: center;
            border: 1px solid var(--chain-border); background: var(--chain-bg);
            font-size: 12px; line-height: 1.4;
        }
        .cert-chain-item.root { font-weight: 500; }
        .cert-chain-item .arrow { text-align: center; color: #8b949e; font-size: 18px; line-height: 1.4; }
        .cert-meta {
            margin-top: 16px; padding: 10px 12px; border-radius: 8px;
            background: #161b22; border: .5px solid #21262d;
        }
        .cert-meta .label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
        .cert-meta .value { font-size: 12.5px; }

        .cert-right .label {
            font-size: 11px; font-weight: 500; color: #8b949e; letter-spacing: .08em;
            text-transform: uppercase; margin-bottom: 10px;
        }
        .cert-use {
            font-size: 12.5px; padding: 9px 12px; border-radius: 8px;
            background: var(--use-bg); border: 1px solid var(--use-border);
            color: #e6edf3; margin-bottom: 14px; line-height: 1.6;
        }
        .cert-pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .cert-pros .ttl, .cert-cons .ttl { font-size: 12px; font-weight: 500; margin-bottom: 7px; }
        .cert-pros .ttl { color: #0f6e56; }
        .cert-cons .ttl { color: #a32d2d; }
        .cert-item { font-size: 12px; color: #8b949e; margin-bottom: 5px; line-height: 1.45; }

        .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; padding: 10px 14px;
            border-radius: 8px; background: #161b22; border: .5px solid #21262d; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-item .tag {
            font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500;
            background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--tag-color);
            white-space: nowrap;
        }
        .legend-item .tag-desc { font-size: 11px; color: #8b949e; }

        .ver-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .ver-btns .divider { width: 1px; height: 20px; background: #21262d; }

        .plain-section { margin-bottom: 14px; }
        .plain-section .hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .plain-section .layer {
            font-size: 10px; font-weight: 600; letter-spacing: .05em; padding: 2px 8px; border-radius: 4px;
            background: var(--layer-bg); color: var(--layer-color);
            border: 1px solid var(--layer-border); text-transform: uppercase;
        }
        .plain-section .phase { font-size: 12px; color: #8b949e; font-weight: 500; }
        .plain-table { border-radius: 8px; border: .5px solid #21262d; overflow: hidden; }
        .plain-row {
            display: grid; grid-template-columns: 1fr auto; gap: 10px;
            padding: 8px 12px; align-items: start;
            border-bottom: .5px solid #21262d;
            background: var(--row-bg);
        }
        .plain-row:last-child { border-bottom: none; }
        .plain-row .lbl { font-size: 12.5px; margin-bottom: 3px; font-weight: 500; }
        .plain-row .note { font-size: 11.5px; color: #8b949e; line-height: 1.5; }

        .callout-warning {
            padding: 12px 16px; border-radius: 8px; background: #854f0b10; border: 1px solid #854f0b33;
            margin-top: 8px;
        }
        .callout-warning .title { font-size: 12.5px; font-weight: 500; color: #854f0b; margin-bottom: 6px; }
        .callout-warning .body { font-size: 12px; color: #8b949e; line-height: 1.7; }

        .ws-steps { display: flex; gap: 12px; margin-bottom: 14px; }
        .ws-steps .num {
            width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
            background: rgba(29,158,117,.22); border: 1px solid rgba(29,158,117,.55);
            color: #1d9e75; font-size: 12px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; margin-top: 2px;
        }
        .ws-steps .content { flex: 1; }
        .ws-steps .step-title { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
        .ws-steps .step-body { font-size: 12px; color: #8b949e; white-space: pre-line; line-height: 1.7; }

        .code-block {
            position: relative; margin: 10px 0;
            background: #161b22; border: .5px solid #21262d; border-radius: 8px;
            padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
            line-height: 1.75; overflow-x: auto; color: #e6edf3;
            white-space: pre;
        }
        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            font-size: 11px; padding: 2px 8px; cursor: pointer;
            background: #0d1117; border: .5px solid #30363d; border-radius: 6px;
            color: #8b949e;
        }

        .ws-table { display: grid; grid-template-columns: 180px 1fr 1fr; gap: 1; }
        .ws-table .head { padding: 8px 10px; border-right: .5px solid #21262d; }
        .ws-table .cell { padding: 8px 10px; border-right: .5px solid #21262d; }

        .tls13-callout {
            padding: 8px 14px; margin-bottom: 14px; border-radius: 8px;
            background: rgba(29,158,117,.12); border: 1px solid rgba(29,158,117,.33);
            font-size: 12px; color: #e6edf3;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        @media (max-width: 900px) {
            .handshake-view { flex-direction: column; }
            .handshake-sidebar { width: 100%; }
            .cert-grid { grid-template-columns: 1fr; }
            .cert-pros-cons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>TLS / SSL 认证与传输演示</h1>
        <p>交互式讲解握手流程 · 四大场景（含浏览器 mTLS）· 明文/加密分析 · Wireshark 抓包解密 · 开发实战</p>
    </div>

    <div class="tabs" id="mainTabs"></div>

    <div id="handshakePanel" class="panel active">
        <div class="scenario-selector" id="scenarioSel"></div>
        <div id="handshakeViz"></div>
    </div>

    <div id="certsPanel" class="panel">
        <div class="pill-btns" id="certPills"></div>
        <div class="cert-grid" id="certView"></div>
    </div>

    <div id="plaintextPanel" class="panel">
        <div class="legend" id="plainLegend"></div>
        <div class="ver-btns" id="verBtns"></div>
        <div id="tls13Callout"></div>
        <div id="plainView"></div>
    </div>

    <div id="wiresharkPanel" class="panel">
        <div class="tabs" id="wsTabs"></div>
        <div id="wsView"></div>
    </div>

    <div id="devPanel" class="panel">
        <div class="tabs" id="devTabs"></div>
        <div id="devView"></div>
    </div>

    <script>
const C = {
    blue:"#185FA5", dkBlue:"#0C447C", green:"#0F6E56", dkGreen:"#085041",
    purple:"#3C3489", ltPurple:"#534AB7", amber:"#854F0B", red:"#A32D2D",
    teal:"#1D9E75", coral:"#993C1D", pink:"#8B3A6E", orange:"#9A4F10",
};

const SCENARIOS = {
    browser:{
        label:"浏览器 HTTPS", icon:"🌐",
        clientLabel:"浏览器", serverLabel:"Web 服务器",
        clientColor:C.blue, serverColor:C.green,
        desc:"最常见的TLS场景。浏览器内置了操作系统/自身的受信任根CA证书存储，可以自动验证服务器证书链，无需手动配置。",
        steps:[
            { from:"C", msg:"Client Hello", color:C.blue,
                detail:"客户端发送以下信息：\n\n① TLS 版本：如 TLS 1.2 / TLS 1.3\n② Client Random：32字节随机数（防重放攻击）\n③ Cipher Suites：支持的密码套件列表\n   如 TLS_AES_256_GCM_SHA384（TLS1.3）\n④ 扩展字段（Extensions）：\n   • SNI（Server Name Indication）：指定目标域名\n   • ALPN：协议协商（HTTP/2、HTTP/1.1）\n   • SessionTicket：会话复用支持" },
            { from:"S", msg:"Server Hello", color:C.green,
                detail:"服务器从客户端列表中选择并返回：\n\n① 选定的 TLS 版本\n② 选定的 Cipher Suite\n③ Server Random：服务器端随机数\n④ Session ID（TLS 1.2）或 KeyShare（TLS 1.3）\n\nTLS 1.3 改进：Server Hello 之后消息立即加密，安全性更高。" },
            { from:"S", msg:"Certificate", color:C.green,
                detail:"服务器发送 X.509 证书（PEM/DER格式），包含：\n\n• Subject：证书主体（域名/组织）\n• SubjectAltName（SAN）：覆盖的域名列表\n• Public Key：服务器公钥（RSA/ECDSA）\n• Issuer：颁发机构（CA）\n• Validity：有效期（NotBefore ~ NotAfter）\n• Signature：CA 的数字签名\n\n可能同时发送证书链（Intermediate CA 证书）。" },
            { from:"S", msg:"Server Hello Done", color:C.green,
                detail:"（仅 TLS 1.2）服务器通知客户端：Hello 握手阶段完成，等待客户端响应。\n\nTLS 1.3 不需要此消息，握手更精简（1-RTT）。" },
            { local:"C", msg:"验证服务器证书", color:C.amber,
                detail:"浏览器/操作系统执行完整证书链验证：\n\n① 证书链构建：Leaf Cert → Intermediate CA → Root CA\n② 签名验证：用 CA 公钥验证每层证书的签名\n③ 有效期：当前时间必须在 NotBefore ~ NotAfter 内\n④ 域名匹配：检查 SAN 字段（或 CN）是否匹配当前域名\n⑤ 吊销检查：\n   • OCSP Stapling（在线证书状态协议）\n   • CRL（证书吊销列表）\n⑥ CT 日志：证书透明度验证（现代浏览器）\n\n任何一步失败 → 显示「您的连接不是私密连接」警告。" },
            { from:"C", msg:"Client Key Exchange", color:C.blue,
                detail:"TLS 1.2（RSA 密钥交换）：\n  客户端生成 Pre-master Secret（48字节），用服务器公钥加密发送。\n\nTLS 1.2/1.3（ECDHE 密钥交换，推荐）：\n  基于椭圆曲线 Diffie-Hellman，提供前向保密（PFS）。\n\n双方各自计算：\n  Master Secret = PRF(pre_master, \"master secret\",\n                      ClientRandom + ServerRandom)\n\n从 Master Secret 派生：Session Key、IV 等。" },
            { from:"C", msg:"Change Cipher Spec + Finished", color:C.blue,
                detail:"Change Cipher Spec：通知服务器，之后的消息都将使用协商好的加密密钥和算法传输。\n\nFinished（加密）：对所有握手消息做哈希，用会话密钥加密发送，验证握手完整性。" },
            { from:"S", msg:"Change Cipher Spec + Finished", color:C.green,
                detail:"服务器同样切换到加密模式，并发送加密的 Finished 消息。\n\n两端 Finished 消息均验证成功后，握手正式完成。" },
            { done:true, msg:"🔒 加密通信建立", color:C.dkGreen,
                detail:"握手完成！建立了端到端加密通道：\n\n加密方式：对称加密（AES-256-GCM / ChaCha20-Poly1305）\n完整性保护：AEAD 认证加密，每条消息均有 MAC\n抗重放：TLS Record 序列号 + 随机 IV\n前向保密：ECDHE 密钥交换（即使私钥泄露，历史记录安全）\n\n之后所有 HTTPS 数据均在此加密隧道中传输，ISP/中间人无法读取或篡改。" },
        ],
    },
    browser_mtls:{
        label:"浏览器 mTLS", icon:"🛡️",
        clientLabel:"浏览器（含客户端证书）", serverLabel:"需要身份认证的服务器",
        clientColor:C.pink, serverColor:C.dkBlue,
        desc:"浏览器双向TLS认证：服务器不仅验证证书，还要求浏览器出示客户端证书来证明用户/设备身份。常见于企业内网、政务系统、网银 U盾、VPN门户等高安全场景。",
        steps:[
            { from:"C", msg:"Client Hello", color:C.pink,
                detail:"浏览器发起握手，与普通 HTTPS 相同。\n\n浏览器侧准备：\n• 客户端证书存储在操作系统证书库中\n  - Windows：证书管理器（certmgr.msc）\n  - macOS：Keychain Access（钥匙串访问）\n  - Linux：NSS 数据库 / p11-kit\n• 或存储在硬件设备中：\n  - USB Token / 智能卡（U盾）\n  - YubiKey / 企业 HSM\n  - 通过 PKCS#11 接口与浏览器通信" },
            { from:"S", msg:"Server Hello + Certificate", color:C.dkBlue,
                detail:"服务器正常发送握手响应和自身证书，供浏览器验证服务器身份。\n\n浏览器验证过程与普通 HTTPS 完全相同：\n• 证书链到达受信任的根 CA\n• 域名与 SAN/CN 匹配\n• 有效期检查\n• OCSP/CRL 吊销检查" },
            { from:"S", msg:"Certificate Request ⭐", color:C.dkBlue,

function setHSSc(k) {
    hsScenario = k;
    hsStep = 0;
    hsPlaying = false;
    clearInterval(hsTimer);
    renderHandshake();
}

function setHSStep(i) {
    hsStep = i;
    hsPlaying = false;
    clearInterval(hsTimer);
    renderHandshake();
}

function resetHS() {
    hsStep = 0;
    hsPlaying = false;
    clearInterval(hsTimer);
    renderHandshake();
}

function prevHS() {
    if (hsStep > 0) { hsStep--; renderHandshake(); }
}

function nextHS() {
    const total = SCENARIOS[hsScenario].steps.length;
    if (hsStep < total - 1) { hsStep++; renderHandshake(); }
}

function toggleHSPlay() {
    if (hsPlaying) {
        hsPlaying = false;
        clearInterval(hsTimer);
    } else {
        hsPlaying = true;
        hsTimer = setInterval(() => {
            const total = SCENARIOS[hsScenario].steps.length;
            if (hsStep >= total - 1) {
                hsPlaying = false;
                clearInterval(hsTimer);
                return;
            }
            hsStep++;
            renderHandshake();
        }, 2200);
    }
    renderHandshake();
}

    document.getElementById('verBtns').innerHTML = `

            style="--pill-bg:${plainVer==='tls12'?C.blue+'22':''};--pill-color:${plainVer==='tls12'?C.blue:''};--pill-border:${plainVer==='tls12'?C.blue+'77':''};--pill-active-bg:${C.blue+'22'};--pill-active-color:${C.blue};--pill-active-border:${C.blue+'77'}"
            onclick="setPlainVer('tls12')">TLS 1.2</button>
        <button class="pill-btn${plainVer==='tls13'?' active':''}"
            style="--pill-bg:${plainVer==='tls13'?C.teal+'22':''};--pill-color:${plainVer==='tls13'?C.teal:''};--pill-border:${plainVer==='tls13'?C.teal+'77':''};--pill-active-bg:${C.teal+'22'};--pill-active-color:${C.teal};--pill-active-border:${C.teal+'77'}"
            onclick="setPlainVer('tls13')">TLS 1.3（更安全）</button>
        <div class="divider"></div>
        <button class="pill-btn${plainMTLS?' active':''}"
            style="--pill-bg:${plainMTLS?C.purple+'22':''};--pill-color:${plainMTLS?C.purple:''};--pill-border:${plainMTLS?C.purple+'77':''};--pill-active-bg:${C.purple+'22'};--pill-active-color:${C.purple};--pill-active-border:${C.purple+'77'}"
            onclick="setPlainMTLS(${!plainMTLS})">${plainMTLS?'✓':'含'} mTLS 差异</button>
    `;

    document.getElementById('tls13Callout').innerHTML = plainVer === 'tls13' ? `
        <div class="tls13-callout">
            🔒+ <strong>TLS 1.3 重大改进</strong>：Server Hello 之后的所有握手消息（含服务器证书、mTLS客户端证书）均已加密。中间人无法读取证书内容。
        </div>
    ` : '';

    document.getElementById('plainView').innerHTML = phases.map(section => `
        <div class="plain-section">
            <div class="hdr">
                <span class="layer" style="--layer-bg:${layerColors[section.layer]+'18'};--layer-color:${layerColors[section.layer]};--layer-border:${layerColors[section.layer]+'44'}">${section.layer}</span>
                <span class="phase">${section.phase}</span>
            </div>
            <div class="plain-table">
                ${section.items
                    .filter(item => {
                        if (!plainMTLS && (item.label.includes('mTLS') || item.label.includes('Certificate Request') || item.label.includes('Client Certificate'))) return false;
                        return true;
                    })
                    .map(item => `
                        <div class="plain-row" style="--row-bg:${item.vis==='plain'?C.red+'06':item.vis==='always'?C.amber+'06':item.vis==='enc13'?C.teal+'06':'transparent'}">
                            <div>
                                <div class="lbl" style="font-weight:${item.vis==='always'?500:400}">${item.label}</div>
                                <div class="note">${item.note}</div>
                            </div>
                            <span class="tag" style="--tag-bg:${VIS_TAGS[item.vis].bg};--tag-border:${VIS_TAGS[item.vis].border};--tag-color:${VIS_TAGS[item.vis].color}">
                                ${VIS_TAGS[item.vis].icon} ${VIS_TAGS[item.vis].label}
                            </span>
                        </div>
                    `).join('')}
            </div>
        </div>
    `).join('') + `
        <div class="callout-warning">
            <div class="title">⚠️ SNI 隐私警告</div>
            <div class="body">
                SNI（Server Name Indication）在 Client Hello 中以<strong>明文</strong>发送，意味着 ISP、网络监控设备都能看到你正在访问哪个域名。
                <strong>ECH（Encrypted Client Hello）</strong>是 IETF 草案标准，可加密 SNI，但目前尚未广泛部署。
            </div>
        </div>
    `;
}

function setPlainVer(v) {
    plainVer = v;
    renderPlaintext();
}

function setPlainMTLS(v) {
    plainMTLS = v;
    renderPlaintext();
}

function renderWireshark() {
    const tabs = [
        { key:'overview', label:'📦 抓包内容' },
        { key:'rsa', label:'🔑 RSA私钥解密' },
        { key:'keylog', label:'📋 SSLKEYLOG（推荐）' },
        { key:'decrypted', label:'🔓 解密后内容' },
    ];
    document.getElementById('wsTabs').innerHTML = tabs.map(t => `
        <button class="tab-btn${wsTab===t.key?' active':''}"
            style="--tab-color:${wsTab===t.key?'#1d9e75':''}"
            onclick="setWSTab('${t.key}')">${t.label}</button>
    `).join('');

    if (wsTab === 'overview') {
        document.getElementById('wsView').innerHTML = `
            <div class="code-block">${WS_CODE.noKey}</div>
        `;
    } else if (wsTab === 'rsa') {
        document.getElementById('wsView').innerHTML = `
            <div style="padding:10px 14px;border-radius:8px;background:#854f0b10;border:1px solid #854f0b44;margin-bottom:14px;font-size:12.5px;line-height:1.7">
                <strong>⚠️ 重大限制</strong>：RSA 私钥解密只适用于 RSA 密钥交换。现代 TLS 1.3 和 ECDHE 无法用此方法解密。
            </div>
            <div class="code-block">${WS_CODE.noKey}</div>
        `;
    } else if (wsTab === 'keylog') {
        document.getElementById('wsView').innerHTML = `
            <div style="padding:10px 14px;border-radius:8px;background:#1d9e7510;border:1px solid #1d9e7533;margin-bottom:14px;font-size:12.5px;line-height:1.7">
                <strong>✅ 推荐方案</strong>：SSLKEYLOGFILE 适用于所有 TLS 版本、所有密钥交换算法。
            </div>
            <div class="code-block">${WS_CODE.keylog}</div>
        `;
    } else if (wsTab === 'decrypted') {
        document.getElementById('wsView').innerHTML = `
            <div class="code-block">${WS_CODE.afterDecrypt}</div>
        `;
    }
}

function setWSTab(t) {
    wsTab = t;
    renderWireshark();
}

function renderDev() {
    const sections = [
        { key:'gen', label:'🔧 证书生成' },
        { key:'oneway', label:'🔒 单向 TLS' },
        { key:'mtls', label:'🔐 双向 mTLS' },
        { key:'manage', label:'📊 证书管理' },
    ];
    document.getElementById('devTabs').innerHTML = sections.map(s => `
        <button class="tab-btn${devSection===s.key?' active':''}"
            style="--tab-color:${devSection===s.key?'#534ab7':''}"
            onclick="setDevSection('${s.key}')">${s.label}</button>
    `).join('');

    let content = '';
    if (devSection === 'gen') {
        content = `
            <div class="pill-btns">
                <button class="pill-btn${devLang==='self'?' active':''}"
                    style="--pill-bg:${devLang==='self'?C.red+'22':''};--pill-color:${devLang==='self'?C.red:''};--pill-border:${devLang==='self'?'#30363d':''};--pill-active-bg:${C.red+'22'};--pill-active-color:${C.red};--pill-active-border:${C.red+'77'}"
                    onclick="setDevLang('self')">自签名（开发/内网）</button>
                <button class="pill-btn${devLang==='ca'?' active':''}"
                    style="--pill-bg:${devLang==='ca'?C.ltPurple+'22':''};--pill-color:${devLang==='ca'?C.ltPurple:''};--pill-border:${devLang==='ca'?'#30363d':''};--pill-active-bg:${C.ltPurple+'22'};--pill-active-color:${C.ltPurple};--pill-active-border:${C.ltPurple+'77'}"
                    onclick="setDevLang('ca')">私有CA + 服务证书（推荐内网）</button>
                <button class="pill-btn${devLang==='le'?' active':''}"
                    style="--pill-bg:${devLang==='le'?C.green+'22':''};--pill-color:${devLang==='le'?C.green:''};--pill-border:${devLang==='le'?'#30363d':''};--pill-active-bg:${C.green+'22'};--pill-active-color:${C.green};--pill-active-border:${C.green+'77'}"
                    onclick="setDevLang('le')">Let's Encrypt（公网）</button>
            </div>
            ${devLang==='self'?'<div style="font-size:12px;color:#8b949e;margin-bottom:8px">适合开发测试、Docker、数据库 TLS、mTLS 客户端证书。</div><div class="code-block">'+CODE.selfSigned+'</div>':''}
            ${devLang==='ca'?'<div style="font-size:12px;color:#8b949e;margin-bottom:8px">企业内网推荐方案：建立私有 PKI，用同一个 CA 颁发所有内部服务证书。</div><div class="code-block">'+CODE.privateCA+'</div>':''}
            ${devLang==='le'?'<div style="font-size:12px;color:#8b949e;margin-bottom:8px">免费的公共 CA，适合所有对外暴露的服务，支持自动续期。</div><div class="code-block">'+CODE.letsencrypt+'</div>':''}
        `;
    } else if (devSection === 'oneway' || devSection === 'mtls') {
        const codeMap = {
            oneway:{ go:CODE.goServer, python:CODE.pythonTLS, node:CODE.nodeJS },
            mtls:{ go:CODE.goMTLS, python:CODE.pythonTLS, node:CODE.nodeJS },
        };
        content = `
            <div class="pill-btns">
                <button class="pill-btn${devLang==='go'?' active':''}"
                    style="--pill-bg:${devLang==='go'?C.teal+'22':''};--pill-color:${devLang==='go'?C.teal:''};--pill-border:${devLang==='go'?'#30363d':''};--pill-active-bg:${C.teal+'22'};--pill-active-color:${C.teal};--pill-active-border:${C.teal+'77'}"
                    onclick="setDevLang('go')">Go</button>
                <button class="pill-btn${devLang==='python'?' active':''}"
                    style="--pill-bg:${devLang==='python'?C.blue+'22':''};--pill-color:${devLang==='python'?C.blue:''};--pill-border:${devLang==='python'?'#30363d':''};--pill-active-bg:${C.blue+'22'};--pill-active-color:${C.blue};--pill-active-border:${C.blue+'77'}"
                    onclick="setDevLang('python')">Python</button>
                <button class="pill-btn${devLang==='node'?' active':''}"
                    style="--pill-bg:${devLang==='node'?C.green+'22':''};--pill-color:${devLang==='node'?C.green:''};--pill-border:${devLang==='node'?'#30363d':''};--pill-active-bg:${C.green+'22'};--pill-active-color:${C.green};--pill-active-border:${C.green+'77'}"
                    onclick="setDevLang('node')">Node.js</button>
            </div>
            ${devSection==='oneway'?'<div style="font-size:12px;color:#8b949e;margin-bottom:8px">单向TLS：只有服务器出示证书。客户端需配置信任的CA。</div>':'<div style="font-size:12px;color:#8b949e;margin-bottom:8px;padding:8px 12px;border-radius:8px;background:#534ab712;border:1px solid #534ab733">双向mTLS：服务器需配置 ClientAuth: RequireAndVerifyClientCert；客户端需同时配置客户端证书。</div>'}
            <div class="code-block">${codeMap[devSection][devLang]}</div>
        `;
    } else if (devSection === 'manage') {
        content = `
            <div style="font-size:12px;color:#8b949e;margin-bottom:10px">证书管理核心工作：检查有效期、验证证书链、监控到期时间。</div>
            <div class="code-block">${CODE.manage}</div>
        `;
    }
    document.getElementById('devView').innerHTML = content;
}

function setDevSection(s) {
    devSection = s;
    if (s === 'oneway' || s === 'mtls') devLang = 'go';
    else if (s === 'gen') devLang = 'self';
    renderDev();
}

function setDevLang(l) {
    devLang = l;
    renderDev();
}

renderMainTabs();
renderHandshake();
    </script>
</body>
