<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事务隔离级别 · 场景演示</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 24px 20px 48px;
        }
        button { font-family: inherit; cursor: pointer; }
        button:disabled { opacity: .35; cursor: default; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .outcome-card { animation: fadeIn .3s ease; }

        .header { margin-bottom: 26px; }
        .header h1 { font-size: 21px; font-weight: 600; letter-spacing: -.5px; margin-bottom: 4px; }
        .header p { font-size: 13px; color: #8b949e; }

        /* Scenario Selector */
        .scenario-btns { display: flex; gap: 9px; margin-bottom: 22px; flex-wrap: wrap; }
        .scenario-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 14px; border-radius: 10px;
            border: 1px solid #30363d; background: #161b22; color: #8b949e;
            font-size: 13px; font-weight: 400; transition: all .15s;
        }
        .scenario-btn.active {
            border-color: #58a6ff; background: rgba(88,166,255,.1); color: #58a6ff; font-weight: 500;
        }
        .scenario-btn:hover:not(.active) { border-color: #484f58; }
        .scenario-btn .sub {
            font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500;
            background: rgba(139,148,158,.1); color: #8b949e;
        }
        .scenario-btn.active .sub { background: rgba(88,166,255,.15); color: #58a6ff; }

        /* Layout */
        .body { display: grid; grid-template-columns: 252px 1fr; gap: 18px; align-items: start; }
        @media (max-width: 900px) { .body { grid-template-columns: 1fr; } }

        /* Left Panel */
        .left { display: flex; flex-direction: column; gap: 13px; }
        .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 16px; }
        .card .emoji { font-size: 22px; margin-bottom: 9px; }
        .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
        .card p { font-size: 12px; color: #8b949e; line-height: 1.75; }
        .card .label {
            font-size: 10px; color: #8b949e; letter-spacing: .08em; text-transform: uppercase;
            margin-bottom: 10px; font-weight: 500;
        }

        /* Table */
        .db-table { font-family: 'JetBrains Mono', monospace; }
        .db-table .tbl-name { font-size: 10px; color: #8b949e; margin-bottom: 6px; }
        .db-table table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .db-table th {
            padding: 3px 6px; text-align: left; color: #e3b341;
            border-bottom: 1px solid #30363d; font-weight: 500;
        }
        .db-table td { padding: 3px 6px; border-bottom: 1px solid #21262d; }

        /* Recommendation */
        .rec-card {
            background: rgba(63,185,80,.06); border: 1px solid rgba(63,185,80,.28);
            border-radius: 12px; padding: 16px;
        }
        .rec-card .label { font-size: 10px; color: #3fb950; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 9px; font-weight: 600; }
        .rec-badge {
            display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
            font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; letter-spacing: .02em; color: #000;
        }

        /* Level comparison */
        .lvl-compare { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
        .lvl-badge {
            font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; min-width: 30px; text-align: center; flex-shrink: 0; margin-top: 1px;
        }
        .lvl-result { font-size: 11px; line-height: 1.5; }
        .lvl-result.ok { color: #8b949e; }
        .lvl-result.fail { color: #f85149; }

        /* Right Panel */
        .right { background: #161b22; border: 1px solid #21262d; border-radius: 12px; overflow: hidden; }

        /* Level Tabs */
        .level-tabs {
            display: flex; gap: 6px; padding: 14px 18px; border-bottom: 1px solid #21262d;
            flex-wrap: wrap; align-items: center;
        }
        .level-tabs .label { font-size: 11px; color: #8b949e; margin-right: 4px; }
        .level-btn {
            padding: 4px 12px; border-radius: 6px; border: 1px solid #30363d;
            background: transparent; color: #8b949e; font-size: 11px; font-weight: 500;
            font-family: 'JetBrains Mono', monospace; transition: all .15s;
        }
        .level-btn.active { border-color: var(--lvl-color); background: var(--lvl-bg); color: var(--lvl-color); }

        /* Timeline */
        .timeline { padding: 18px 18px 6px; }
        .tl-header { display: grid; grid-template-columns: 1fr 46px 1fr; margin-bottom: 14px; }
        .tl-header .tx-label { display: flex; align-items: center; gap: 7px; }
        .tl-header .tx-label.right { justify-content: flex-end; }
        .tl-header .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .tl-header .tx-name { font-size: 13px; font-weight: 500; }
        .tl-header .time-label { text-align: center; font-size: 9px; color: #8b949e; }

        .tl-body { position: relative; }
        .tl-axis {
            position: absolute; left: calc(50% - .5px); top: 0; bottom: 0;
            width: 1px; background: #21262d; pointer-events: none;
        }
        .tl-row {
            display: grid; grid-template-columns: 1fr 46px 1fr; margin-bottom: 6px;
            transition: opacity .4s ease;
        }
        .tl-row.hidden { opacity: 0.16; }
        .tl-row .side { display: flex; }
        .tl-row .side.t1 { padding-right: 10px; justify-content: flex-end; }
        .tl-row .side.t2 { padding-left: 10px; justify-content: flex-start; }
        .tl-row .time-dot {
            display: flex; justify-content: center; padding-top: 8px;
        }
        .tl-row .time-dot .circle {
            width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; z-index: 1;
            background: #1c2333; border: 1px solid #30363d;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; color: #8b949e; transition: all .25s;
        }
        .tl-row .time-dot .circle.current {
            background: #58a6ff; border-color: #58a6ff; color: #000;
        }

        /* Step Card */
        .step-card {
            border-radius: 8px; padding: 8px 10px; width: 100%;
            transition: border-color .3s, background .3s;
        }
        .step-card.anomaly {
            background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.45);
        }
        .step-card.current {
            background: rgba(88,166,255,.05); border: 1px solid rgba(88,166,255,.25);
        }
        .step-card.normal {
            background: rgba(255,255,255,.02); border: 1px solid #21262d;
        }
        .step-card .op-header { display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; }
        .step-card .op-tag {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            min-width: 46px; padding-top: 1px; letter-spacing: .04em;
        }
        .step-card .sql {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            word-break: break-all; line-height: 1.55; flex: 1;
        }
        .step-card .read-val {
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            margin-top: 6px; padding: 2px 8px; border-radius: 4px;
        }
        .step-card .read-val.anomaly { color: #f85149; background: rgba(248,81,73,.1); }
        .step-card .read-val.normal { color: #3fb950; background: rgba(63,185,80,.08); }
        .step-card .desc { font-size: 10px; color: #8b949e; margin-top: 5px; line-height: 1.55; }
        .step-card .anomaly-label {
            font-size: 9px; color: #f85149; font-weight: 700; margin-top: 4px; letter-spacing: .05em;
        }

        /* Controls */
        .controls {
            padding: 12px 18px; border-top: 1px solid #21262d;
            display: flex; align-items: center; gap: 8px;
        }
        .ctrl-btn {
            padding: 5px 11px; border-radius: 6px; font-size: 12px;
            border: 1px solid #30363d; background: transparent; color: #8b949e;
            transition: all .15s;
        }
        .ctrl-btn.accent { border-color: rgba(63,185,80,.5); background: rgba(63,185,80,.1); color: #3fb950; }
        .ctrl-btn.accent.playing { border-color: rgba(248,81,73,.5); background: rgba(248,81,73,.1); color: #f85149; }
        .step-info { margin-left: auto; font-size: 11px; color: #8b949e; }

        /* Outcome Card */
        .outcome-card {
            margin: 0 18px 20px; border-radius: 10px; padding: 14px;
        }
        .outcome-card.success { background: rgba(35,134,54,.1); border: 1px solid rgba(35,134,54,.35); }
        .outcome-card.fail { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.35); }
        .outcome-card .outcome-header { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
        .outcome-card .outcome-icon { font-size: 18px; }
        .outcome-card .outcome-title { font-weight: 600; font-size: 14px; }
        .outcome-card .outcome-title.success { color: #3fb950; }
        .outcome-card .outcome-title.fail { color: #f85149; }
        .outcome-card .outcome-desc { font-size: 12px; color: #8b949e; line-height: 1.75; }
    </style>
</head>
<body>
    <div class="header">
        <h1>事务隔离级别 · 场景演示</h1>
        <p>选择场景和隔离级别，逐步观察并发事务的行为与异常</p>
    </div>

    <div id="scenarioBtns" class="scenario-btns"></div>

    <div class="body">
        <div class="left" id="leftPanel"></div>
        <div class="right" id="rightPanel"></div>
    </div>

    <script>
        const C = {
            bg:"#0d1117", surf:"#161b22", surf2:"#1c2333", surf3:"#21262d",
            bd:"#30363d", bd2:"#21262d",
            T1:"#3fb950", T2:"#58a6ff",
            txt:"#e6edf3", mut:"#8b949e",
            red:"#f85149", amb:"#e3b341", grn:"#3fb950",
            RU:"#f85149", RC:"#e3b341", RR:"#58a6ff", S:"#3fb950",
        };
        const LVL = ["RU","RC","RR","S"];
        const LVL_NAME = { RU:"Read Uncommitted", RC:"Read Committed", RR:"Repeatable Read", S:"Serializable" };
        const LVL_FULL = { RU:"READ UNCOMMITTED", RC:"READ COMMITTED", RR:"REPEATABLE READ", S:"SERIALIZABLE" };
        const LVL_BG   = { RU:"rgba(248,81,73,.12)", RC:"rgba(227,179,65,.12)", RR:"rgba(88,166,255,.12)", S:"rgba(63,185,80,.12)" };
        const LVL_BD   = { RU:"rgba(248,81,73,.4)", RC:"rgba(227,179,65,.4)", RR:"rgba(88,166,255,.4)", S:"rgba(63,185,80,.4)" };
        const OP_C     = { begin:"#8b949e", read:"#58a6ff", write:"#e3b341", commit:"#3fb950", rollback:"#f85149" };

        function rv(val, lid) {
            if (!val) return null;
            if (typeof val === "string") return val;
            return val[lid] ?? val.all ?? null;
        }

        const SCENARIOS = [
            {
                id:"bank", emoji:"🏦", title:"银行信用评估", sub:"脏读场景",
                recTag:"RC 最低足够",
                desc:"T1（转账事务）修改账户余额尚未提交；T2（信用系统）同时读取余额用于评估。若 T2 读到 T1 未提交的数据，而 T1 随后回滚，则评估结论无效。",
                table:{ name:"accounts", cols:["id","owner","balance"],
                    rows:[["A","Alice","¥1,000"],["B","Bob","¥200"]] },
                rec:"RC",
                recNote:"脏读是此场景唯一风险。Read Committed 精准防止，同时保留最高并发性能。无需更强的隔离级别。",
                steps:[
                    { t:1, tx:"T1", op:"begin",    sql:"BEGIN", desc:"Alice 发起转账事务" },
                    { t:2, tx:"T2", op:"begin",    sql:"BEGIN", desc:"信用系统发起查询事务" },
                    { t:3, tx:"T1", op:"read",     sql:"SELECT balance FROM accounts WHERE id='A'", reads:{ all:"¥1,000" } },
                    { t:4, tx:"T1", op:"write",    sql:"UPDATE accounts SET balance=500 WHERE id='A'", desc:"余额修改为 ¥500，未提交" },
                    { t:5, tx:"T2", op:"read",     sql:"SELECT balance FROM accounts WHERE id='A'", reads:{ RU:"¥500 ← 未提交！", RC:"¥1,000", RR:"¥1,000", S:"¥1,000" }, anomaly:["RU"], aLabel:"脏读" },
                    { t:6, tx:"T1", op:"rollback", sql:"ROLLBACK", desc:"转账失败，余额回滚至 ¥1,000" },
                    { t:7, tx:"T2", op:"commit",   sql:"COMMIT", desc:{ RU:"❌ 基于已回滚的 ¥500 完成评估，结论错误", RC:"✓ 基于真实的 ¥1,000，评估正确", RR:"✓ 正确", S:"✓ 正确" } },
                ],
                outcomes:{
                    RU:{ ok:false, type:"脏读", desc:"T2 读到 T1 未提交的 ¥500，T1 回滚后余额仍为 ¥1,000。信用评估基于无效数据，结论完全错误。" },
                    RC:{ ok:true, desc:"T2 只能看到已提交的值 ¥1,000，完全规避脏读。Read Committed 是此场景的最优选择。" },
                    RR:{ ok:true, desc:"同 RC，额外保证事务内读取一致性。此场景 RC 已足够，RR 略显保守。" },
                    S:{ ok:true, desc:"完全安全，但性能开销最大，此场景完全不必要。" },
                }
            },
            {
                id:"report", emoji:"📊", title:"月度财务报表", sub:"幻读场景",
                recTag:"RR 推荐",
                desc:"T1 正在生成月度报表，需多次查询（先 SUM 再 COUNT）保持数据一致；T2 同期插入新订单并提交，导致 T1 两次结果不同。",
                table:{ name:"orders", cols:["id","amount","month"],
                    rows:[["1","¥20,000","2024-01"],["2","¥30,000","2024-01"]] },
                rec:"RR",
                recNote:"报表需要整个事务内的一致数据快照。Repeatable Read 通过 MVCC 快照防止幻读，保证多次查询基于同一版本数据。",
                steps:[
                    { t:1, tx:"T1", op:"begin",  sql:"BEGIN  -- 生成报表" },
                    { t:2, tx:"T1", op:"read",   sql:"SELECT SUM(amount) FROM orders WHERE month='2024-01'", reads:{ all:"¥50,000" }, desc:"报表第一步：汇总金额" },
                    { t:3, tx:"T2", op:"begin",  sql:"BEGIN  -- 新订单入库" },
                    { t:4, tx:"T2", op:"write",  sql:"INSERT INTO orders VALUES (3, 5000, '2024-01')" },
                    { t:5, tx:"T2", op:"commit", sql:"COMMIT", desc:"新订单 ¥5,000 已提交" },
                    { t:6, tx:"T1", op:"read",   sql:"SELECT COUNT(*) FROM orders WHERE month='2024-01'", reads:{ RU:"3 行 ← 幻读！", RC:"3 行 ← 幻读！", RR:"2 行 ✓", S:"2 行 ✓" }, anomaly:["RU","RC"], aLabel:"幻读" },
                    { t:7, tx:"T1", op:"commit", sql:"COMMIT", desc:{ RU:"❌ SUM=¥50,000 但 COUNT=3，数据矛盾！", RC:"❌ SUM=¥50,000 但 COUNT=3，数据矛盾！", RR:"✓ 始终基于事务快照，COUNT=2，完全一致", S:"✓ 完全一致" } },
                ],
                outcomes:{
                    RU:{ ok:false, type:"幻读", desc:"T1 的 SUM 和 COUNT 查询看到不同行数，财务报表 SUM=¥50,000 但 COUNT=3，数据自相矛盾。" },
                    RC:{ ok:false, type:"幻读", desc:"T2 插入并提交后，T1 后续查询看到新行。SUM 与 COUNT 不一致，报表有误。Read Committed 无法防止幻读。" },
                    RR:{ ok:true, desc:"T1 持有事务开始时的一致快照，T2 的插入对 T1 完全不可见。SUM 与 COUNT 始终基于相同数据，报表正确。" },
                    S:{ ok:true, desc:"完全安全。此场景用 Repeatable Read 已足够，无需 Serializable 的额外开销。" },
                }
            },
            {
                id:"flash", emoji:"⚡", title:"电商秒杀抢购", sub:"超卖场景",
                recTag:"S / FOR UPDATE",
                desc:"限量商品库存仅剩 1 件，Alice 和 Bob 同时发起购买，两个事务都读到 stock=1 并决定下单。",
                table:{ name:"products", cols:["id","name","stock"],
                    rows:[["101","限量球鞋","1"]] },
                rec:"S",
                recNote:"Serializable 检测读写冲突并中止一个事务，防止超卖。生产中更常用 SELECT FOR UPDATE + RC，用显式行锁实现，性能更好。",
                steps:[
                    { t:1, tx:"T1", op:"begin",  sql:"BEGIN  -- Alice" },
                    { t:2, tx:"T2", op:"begin",  sql:"BEGIN  -- Bob" },
                    { t:3, tx:"T1", op:"read",   sql:"SELECT stock FROM products WHERE id=101", reads:{ all:"stock = 1" } },
                    { t:4, tx:"T2", op:"read",   sql:"SELECT stock FROM products WHERE id=101", reads:{ all:"stock = 1" } },
                    { t:5, tx:"T1", op:"write",  sql:"UPDATE products SET stock=stock-1 WHERE id=101", desc:"Alice 扣减库存" },
                    { t:6, tx:"T1", op:"commit", sql:"COMMIT", desc:"Alice 购买成功，stock=0" },
                    { t:7, tx:"T2", op:"write",  sql:"UPDATE products SET stock=stock-1 WHERE id=101", desc:{ RU:"stock 变为 -1 ⚠", RC:"stock 变为 -1 ⚠", RR:"stock 变为 -1 ⚠（旧快照）", S:"序列化冲突，T2 被中止" }, anomaly:["RU","RC","RR"], aLabel:"超卖" },
                    { t:8, tx:"T2", op:"commit", sql:{ RU:"COMMIT", RC:"COMMIT", RR:"COMMIT", S:"ROLLBACK  -- 序列化失败" }, opByLevel:{ S:"rollback" }, desc:{ RU:"❌ Bob\"成功\"购买，stock=-1 超卖！", RC:"❌ Bob\"成功\"购买，stock=-1 超卖！", RR:"❌ 基于旧快照决策，stock=-1 超卖！", S:"✓ Bob 收到\"库存不足\"提示，无超卖" } },
                ],
                outcomes:{
                    RU:{ ok:false, type:"超卖", desc:"两个事务都通过了 stock>0 检查，最终 stock=-1，超卖发生。" },
                    RC:{ ok:false, type:"超卖", desc:"并发下两个事务同时通过检查。需使用 SELECT FOR UPDATE 显式加行锁才能在 RC 级别防止超卖。" },
                    RR:{ ok:false, type:"超卖（写偏斜）", desc:"T2 基于事务开始时的快照（stock=1）作出决策，T1 提交后 T2 仍继续，造成超卖。MVCC 快照无法防止此类更新冲突。" },
                    S:{ ok:true, desc:"Serializable 检测到 T1 对 T2 读取集合的写入造成序列化冲突，T2 被中止。Bob 收到库存不足提示并可重试，不会超卖。" },
                }
            },
            {
                id:"social", emoji:"💬", title:"社交平台动态", sub:"RC 足够",
                recTag:"RC 最优",
                desc:"T1 用户正在浏览动态列表，T2 有人发布新内容并提交。轻微的「新内容不立即可见」在社交场景中是完全可接受的。",
                table:{ name:"posts", cols:["id","author","content"],
                    rows:[["1","Alice","今天天气真好"],["2","Bob","分享技术文章"]] },
                rec:"RC",
                recNote:"社交场景读操作密集、允许轻微时间差。Read Committed 在最大化并发性能的同时保证读到有效数据，是最优选择。",
                steps:[
                    { t:1, tx:"T1", op:"begin",  sql:"BEGIN  -- 用户浏览动态" },
                    { t:2, tx:"T1", op:"read",   sql:"SELECT * FROM posts ORDER BY created_at DESC LIMIT 20", reads:{ all:"2 条动态" }, desc:"加载初始动态列表" },
                    { t:3, tx:"T2", op:"begin",  sql:"BEGIN  -- Carol 发新帖" },
                    { t:4, tx:"T2", op:"write",  sql:"INSERT INTO posts VALUES (3,'Carol','Hello World!')" },
                    { t:5, tx:"T2", op:"commit", sql:"COMMIT" },
                    { t:6, tx:"T1", op:"read",   sql:"SELECT COUNT(*) FROM posts", reads:{ RU:"3", RC:"3（可见新帖）", RR:"2（快照）", S:"2（快照）" }, desc:{ RC:"✓ 已提交的新帖可见，用户刷新后自然更新", RR:"也可接受，稍有延迟" } },
                    { t:7, tx:"T1", op:"commit", sql:"COMMIT", desc:{ RU:"可接受（无脏数据风险）", RC:"✓ 最优：高并发 + 及时可见已提交内容", RR:"安全但对此场景过于保守", S:"安全但串行化开销完全不必要" } },
                ],
                outcomes:{
                    RU:{ ok:true, desc:"此场景无并发写入冲突，RU 不引入实际问题，但不建议作为默认选项。" },
                    RC:{ ok:true, desc:"最优选择：并发性能最高，已提交的新内容及时可见，完全满足社交动态的业务需求。" },
                    RR:{ ok:true, desc:"安全，但事务内看不到新发布内容，对高频刷新场景略显保守，还增加了快照维护开销。" },
                    S:{ ok:true, desc:"安全，但对读密集场景施加串行化约束，大幅降低并发能力，属于完全不必要的过度设计。" },
                }
            },
        ];

        let scIdx = 0;
        let lid = "RC";
        let step = -1;
        let playing = false;
        let timer = null;

        function render() {
            const sc = SCENARIOS[scIdx];
            const total = sc.steps.length;
            const outcome = sc.outcomes[lid];
            const atEnd = step >= total - 1;
            const atStart = step < 0;
            const recColor = C[sc.rec];

            // Scenario buttons
            const btnsEl = document.getElementById('scenarioBtns');
            btnsEl.innerHTML = SCENARIOS.map((s, i) => {
                const active = i === scIdx;
                return `<button class="scenario-btn${active ? ' active' : ''}" onclick="setSc(${i})">
                    <span style="font-size:15px">${s.emoji}</span>
                    <span>${s.title}</span>
                    <span class="sub">${s.sub}</span>
                </button>`;
            }).join('');

            // Left panel
            const leftEl = document.getElementById('leftPanel');
            leftEl.innerHTML = `
                <div class="card">
                    <div class="emoji">${sc.emoji}</div>
                    <h2>${sc.title}</h2>
                    <p>${sc.desc}</p>
                </div>
                <div class="card">
                    <div class="label">初始数据</div>
                    <div class="db-table">
                        <div class="tbl-name">TABLE ${sc.table.name}</div>
                        <table>
                            <thead><tr>${sc.table.cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
                            <tbody>${sc.table.rows.map((row, i) =>
                                `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`
                            ).join('')}</tbody>
                        </table>
                    </div>
                </div>
                <div class="rec-card">
                    <div class="label">推荐隔离级别</div>
                    <div class="rec-badge" style="background:${recColor}">${LVL_FULL[sc.rec]}</div>
                    <p>${sc.recNote}</p>
                </div>
                <div class="card">
                    <div class="label">各级别在此场景</div>
                    ${LVL.map(l => {
                        const out = sc.outcomes[l];
                        return `<div class="lvl-compare">
                            <span class="lvl-badge" style="background:${LVL_BG[l]};color:${C[l]}">${l}</span>
                            <span class="lvl-result ${out.ok ? 'ok' : 'fail'}">${out.ok ? '✓ 安全' : `❌ ${out.type}`}</span>
                        </div>`;
                    }).join('')}
                </div>
            `;

            // Right panel
            const rightEl = document.getElementById('rightPanel');
            let stepsHtml = '';
            sc.steps.forEach((s, i) => {
                const visible = i <= step;
                const cur = i === step;
                const opStr = s.opByLevel?.[lid] || s.op;
                const sqlStr = rv(s.sql, lid) || s.sql;
                const rdVal = rv(s.reads, lid);
                const descStr = rv(s.desc, lid);
                const isAnom = s.anomaly?.includes(lid) ?? false;
                const oc = OP_C[opStr] || C.mut;
                const cardClass = isAnom ? 'anomaly' : cur ? 'current' : 'normal';

                let cardInner = `
                    <div class="op-header">
                        <span class="op-tag" style="color:${oc}">${opStr}</span>
                        <span class="sql">${escHtml(sqlStr)}</span>
                    </div>`;
                if (rdVal) {
                    cardInner += `<div class="read-val ${isAnom ? 'anomaly' : 'normal'}">${isAnom ? '⚠ ' : '→ '}${escHtml(rdVal)}</div>`;
                }
                if (descStr) {
                    cardInner += `<div class="desc">${escHtml(descStr)}</div>`;
                }
                if (isAnom && s.aLabel) {
                    cardInner += `<div class="anomaly-label">↑ ${s.aLabel}</div>`;
                }

                const t1Side = s.tx === 'T1' ? `<div class="side t1"><div class="step-card ${cardClass}">${cardInner}</div></div>` : '<div class="side t1"></div>';
                const t2Side = s.tx === 'T2' ? `<div class="side t2"><div class="step-card ${cardClass}">${cardInner}</div></div>` : '<div class="side t2"></div>';

                stepsHtml += `<div class="tl-row${visible ? '' : ' hidden'}">
                    ${t1Side}
                    <div class="time-dot"><div class="circle${cur ? ' current' : ''}">${s.t}</div></div>
                    ${t2Side}
                </div>`;
            });

            const controls = [
                { label: '↺ 重置', fn: 'reset()', dis: atStart && !playing },
                { label: '← 后退', fn: 'prev()', dis: atStart },
                { label: playing ? '⏸ 暂停' : '▶ 播放', fn: 'togglePlay()', accent: true, playing, dis: atEnd && !playing },
                { label: '前进 →', fn: 'next()', dis: atEnd },
            ];

            rightEl.innerHTML = `
                <div class="level-tabs">
                    <span class="label">模拟隔离级别：</span>
                    ${LVL.map(l => {
                        const active = l === lid;
                        return `<button class="level-btn${active ? ' active' : ''}"
                            style="${active ? '--lvl-color:'+C[l]+';--lvl-bg:'+LVL_BG[l] : ''}"
                            onclick="setLid('${l}')">${LVL_NAME[l]}</button>`;
                    }).join('')}
                </div>
                <div class="timeline">
                    <div class="tl-header">
                        <div class="tx-label">
                            <span class="dot" style="background:${C.T1}"></span>
                            <span class="tx-name" style="color:${C.T1}">事务 T1</span>
                        </div>
                        <div class="time-label"><span>时序</span></div>
                        <div class="tx-label right">
                            <span class="tx-name" style="color:${C.T2}">事务 T2</span>
                            <span class="dot" style="background:${C.T2}"></span>
                        </div>
                    </div>
                    <div class="tl-body">
                        <div class="tl-axis"></div>
                        ${stepsHtml}
                    </div>
                </div>
                <div class="controls">
                    ${controls.map(b => `<button class="ctrl-btn${b.accent ? ' accent' : ''}${b.playing ? ' playing' : ''}"
                        ${b.dis ? 'disabled' : ''} onclick="${b.dis ? '' : b.fn}">${b.label}</button>`).join('')}
                    <span class="step-info">${atStart ? '就绪' : `步骤 ${step+1} / ${total}`}</span>
                </div>
                ${atEnd ? `
                <div class="outcome-card ${outcome.ok ? 'success' : 'fail'}">
                    <div class="outcome-header">
                        <span class="outcome-icon">${outcome.ok ? '✅' : '❌'}</span>
                        <span class="outcome-title ${outcome.ok ? 'success' : 'fail'}">${outcome.ok ? '安全 — 无并发异常' : `异常：${outcome.type}`}</span>
                    </div>
                    <p class="outcome-desc">${outcome.desc}</p>
                </div>` : ''}
            `;
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function setSc(i) { scIdx = i; step = -1; playing = false; clearInterval(timer); render(); }
        function setLid(l) { lid = l; step = -1; playing = false; clearInterval(timer); render(); }
        function reset() { step = -1; playing = false; clearInterval(timer); render(); }
        function prev() { if (step > -1) { step--; render(); } }
        function next() { if (step < SCENARIOS[scIdx].steps.length - 1) { step++; render(); } }
        function togglePlay() {
            if (playing) {
                playing = false;
                clearInterval(timer);
            } else {
                playing = true;
                timer = setInterval(() => {
                    if (step >= SCENARIOS[scIdx].steps.length - 1) {
                        playing = false;
                        clearInterval(timer);
                        return;
                    }
                    step++;
                    render();
                }, 1300);
            }
            render();
        }

        render();
    </script>
</body>
</html>
