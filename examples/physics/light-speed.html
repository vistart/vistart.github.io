<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>光速考 · 地质田野手记</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Special+Elite&family=IM+Fell+English:ital@0;1&family=IM+Fell+DW+Pica:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --paper:#e4d6b8;
  --paper-hi:#ede0c4;
  --paper-lo:#c9b893;
  --paper-edge:#a89772;
  --ink:#3b2a18;
  --ink-soft:#5a4530;
  --rust:#8a3726;
  --rust-deep:#5e2317;
  --pencil:#594f42;
  --ochre:#b47a24;
  --ochre-light:#d9a757;
  --moss:#6a7238;
  --iron:#412816;
  --teal:#4a6769;
  --grid:rgba(80,60,38,.10);
  --grid-mini:rgba(80,60,38,.05);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
body{
  font-family:'Noto Serif SC', serif;
  font-weight:400;
  background:
    radial-gradient(ellipse at 12% 8%, rgba(138,55,38,.05), transparent 40%),
    radial-gradient(ellipse at 88% 22%, rgba(106,114,56,.05), transparent 40%),
    radial-gradient(ellipse at 55% 65%, rgba(180,122,36,.06), transparent 45%),
    linear-gradient(var(--paper-hi), var(--paper) 40%, var(--paper-lo));
  background-attachment: fixed;
  min-height:100vh;
  overflow-x:hidden;
}

/* Paper grain overlay on body */
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.26  0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0.25 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity:.35;
  mix-blend-mode:multiply;
  z-index:1;
}
/* Vignette */
body::after{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(55,35,18,.25) 100%);
  z-index:2;
}

.hand{font-family:'Ma Shan Zheng', cursive; font-weight:400; letter-spacing:.02em;}
.brush{font-family:'Liu Jian Mao Cao', cursive; font-weight:400;}
.display{font-family:'ZCOOL XiaoWei', serif; font-weight:400;}
.type{font-family:'Special Elite', monospace;}
.old{font-family:'IM Fell English', serif;}
.oldd{font-family:'IM Fell DW Pica', serif;}

/* Paper texture: used on individual notebook leaves */
.leaf{
  position:relative;
  background:
    radial-gradient(circle at 18% 22%, rgba(65,40,22,.04) 0%, transparent 35%),
    radial-gradient(circle at 82% 78%, rgba(180,122,36,.05) 0%, transparent 40%),
    linear-gradient(var(--paper-hi), var(--paper) 50%, #dbcba2);
  box-shadow:
    0 1px 0 rgba(255,240,210,.5) inset,
    0 -1px 0 rgba(110,80,45,.15) inset,
    0 1px 2px rgba(55,35,18,.10),
    0 8px 16px rgba(55,35,18,.12),
    0 24px 60px -20px rgba(55,35,18,.25);
  border-radius:2px;
}
.leaf::before{
  content:"";
  position:absolute; inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.30  0 0 0 0 0.22  0 0 0 0 0.12  0 0 0 0.30 0'/></filter><rect width='100%' height='100%' filter='url(%23g)'/></svg>");
  opacity:.45; mix-blend-mode:multiply;
  pointer-events:none;
  border-radius:inherit;
}
/* Coffee/ink stain overlay placed per-page via inline style */
.stain{
  position:absolute;
  pointer-events:none;
  border-radius:50%;
  background:radial-gradient(circle, rgba(107,55,25,.18) 0%, rgba(107,55,25,.10) 40%, rgba(107,55,25,.04) 70%, transparent 100%);
  mix-blend-mode:multiply;
}

/* Grid lines – field notebook graph paper */
.grid-lines{
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    linear-gradient(var(--grid-mini) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-mini) 1px, transparent 1px);
  background-size: 88px 88px, 88px 88px, 22px 22px, 22px 22px;
  background-position: 0 0, 0 0, 0 0, 0 0;
}
.dot-grid{
  background-image: radial-gradient(var(--grid) 1.2px, transparent 1.2px);
  background-size: 20px 20px;
}

/* Washi tape */
.tape{
  position:absolute;
  width:130px; height:34px;
  background:
    repeating-linear-gradient(90deg,
      rgba(180,122,36,.42) 0 10px,
      rgba(215,165,80,.42) 10px 22px),
    linear-gradient(rgba(255,240,210,.4), rgba(255,240,210,.4));
  box-shadow: 0 3px 8px rgba(55,35,18,.2), inset 0 0 0 1px rgba(255,245,220,.25);
  border-left: 1px dashed rgba(0,0,0,.10);
  border-right: 1px dashed rgba(0,0,0,.10);
  mix-blend-mode:multiply;
}
.tape.teal{
  background:
    repeating-linear-gradient(90deg,
      rgba(74,103,105,.45) 0 10px,
      rgba(115,150,150,.40) 10px 22px);
}
.tape.rust{
  background:
    repeating-linear-gradient(90deg,
      rgba(138,55,38,.42) 0 10px,
      rgba(180,90,70,.40) 10px 22px);
}

/* Torn paper corner (for pinned specimens/photos) */
.specimen{
  position:relative;
  background: linear-gradient(#efe0be, #d8c39c);
  box-shadow:
    0 1px 0 rgba(255,240,210,.6) inset,
    0 -1px 0 rgba(110,80,45,.25) inset,
    0 6px 14px rgba(55,35,18,.2);
  padding:10px;
}
.specimen::after{
  content:"";
  position:absolute; inset:0;
  pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='s'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.12 0 0 0 0 0.06 0 0 0 0.25 0'/></filter><rect width='100%' height='100%' filter='url(%23s)'/></svg>");
  opacity:.4; mix-blend-mode:multiply;
}

/* Stamp look */
.stamp{
  display:inline-block;
  padding:6px 14px 5px;
  border:2.5px solid var(--rust);
  color:var(--rust);
  font-family:'Special Elite', monospace;
  letter-spacing:.15em;
  transform:rotate(-3deg);
  position:relative;
  background:rgba(138,55,38,.04);
  text-transform:uppercase;
}
.stamp::before{
  content:"";
  position:absolute; inset:-3px;
  border:2.5px solid var(--rust);
  opacity:.35;
  transform:translate(1px,1px) rotate(.5deg);
  pointer-events:none;
}
.stamp.ochre{ color:var(--ochre); border-color:var(--ochre); background:rgba(180,122,36,.06);}
.stamp.ochre::before{ border-color:var(--ochre);}
.stamp.moss{ color:var(--moss); border-color:var(--moss); background:rgba(106,114,56,.06);}
.stamp.moss::before{ border-color:var(--moss);}

/* Circular seal */
.seal{
  width:92px; height:92px; border-radius:50%;
  border:2.5px solid var(--rust);
  display:flex; align-items:center; justify-content:center;
  color:var(--rust);
  position:relative;
  font-family:'ZCOOL XiaoWei', serif;
  background:rgba(138,55,38,.04);
  box-shadow:inset 0 0 0 4px var(--paper-hi), inset 0 0 0 6px var(--rust);
}

/* Red underline like pen-corrected */
.underline-rust{
  background-image: linear-gradient(transparent 88%, rgba(138,55,38,.55) 0);
  background-repeat:no-repeat;
  background-size:100% 100%;
}
.underline-wavy{
  text-decoration: underline wavy var(--rust);
  text-underline-offset: 4px;
}

/* Margin annotation style */
.margin{
  color:var(--rust);
  font-family:'Ma Shan Zheng', cursive;
  line-height:1.5;
}

/* Drop cap for first paragraph of each leaf */
.dropcap::first-letter{
  font-family:'ZCOOL XiaoWei', serif;
  font-size: 3.8em;
  float:left;
  line-height:.88;
  padding:.04em .12em 0 0;
  color:var(--rust-deep);
  text-shadow: 1px 1px 0 rgba(0,0,0,.08);
}

/* Pencil sketch style lines */
.sketch-line{
  stroke:var(--ink);
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.sketch-rust{ stroke:var(--rust); }
.sketch-pencil{ stroke:var(--pencil); }
.sketch-ochre{ stroke:var(--ochre); }
.sketch-moss{ stroke:var(--moss); }

/* Roughen filter for sketched look */
.rough{ filter:url(#roughen); }
.rough-soft{ filter:url(#roughen-soft); }

/* Animations */
@keyframes driftIn{
  from{opacity:0; transform:translateY(18px) rotate(var(--r,0deg));}
  to{opacity:1; transform:translateY(0) rotate(var(--r,0deg));}
}
.drift{animation:driftIn .9s ease-out both;}

@keyframes slowSpin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
.spin-slow{animation:slowSpin 14s linear infinite;}
.spin-fast{animation:slowSpin 3s linear infinite;}

@keyframes lightPulse{
  0%,100%{opacity:.6;}
  50%{opacity:1;}
}
.pulse{animation:lightPulse 2.4s ease-in-out infinite;}

@keyframes rayTravel{
  0%{stroke-dashoffset:800; opacity:.2;}
  30%{opacity:1;}
  100%{stroke-dashoffset:0; opacity:1;}
}
.ray{
  stroke-dasharray:800;
  animation:rayTravel 3s ease-in-out infinite;
}

/* Side stratigraphic column */
.strat-nav{
  position:fixed;
  left: 18px;
  top: 50%;
  transform:translateY(-50%);
  z-index: 40;
  display:flex;
  flex-direction:column;
  gap: 0;
  width: 62px;
  background: linear-gradient(#efe0be, #d8c39c);
  border: 1px solid rgba(80,60,38,.3);
  box-shadow: 0 6px 14px rgba(55,35,18,.2);
  padding: 4px 2px;
}
.strat-nav .item{
  height: 38px;
  border-bottom: 1px dashed rgba(80,60,38,.3);
  padding: 4px 6px 2px;
  font-family:'Special Elite', monospace;
  font-size: 9px;
  color: var(--ink-soft);
  cursor:pointer;
  position:relative;
  transition: background .2s;
  display:flex; flex-direction:column; justify-content:center;
}
.strat-nav .item:last-child{border-bottom:none;}
.strat-nav .item:hover{ background: rgba(180,122,36,.15); }
.strat-nav .item.active{ background: rgba(138,55,38,.12); color: var(--rust-deep);}
.strat-nav .item .yr{font-size:10px; font-weight:bold;}
.strat-nav .item .lbl{font-size:8px; opacity:.8; font-family:'Ma Shan Zheng', cursive;}

/* Stratigraphic pattern blocks (left strip) */
.strat-pat{
  width: 10px;
  position:absolute; left:0; top:0; bottom:0;
}
.pat-1{background: repeating-linear-gradient(0deg, #8a7354 0 3px, #6b583d 3px 6px);}
.pat-2{background: repeating-linear-gradient(0deg, #a08866 0 2px, #7d6748 2px 4px);}
.pat-3{background: repeating-linear-gradient(45deg, #9a8055 0 4px, #7c6741 4px 8px);}
.pat-4{background: radial-gradient(circle at 50% 30%, #8a5a2e 2px, transparent 3px) 0 0/10px 10px, #6d4823;}
.pat-5{background: repeating-linear-gradient(90deg, #736142 0 3px, #584a33 3px 6px);}
.pat-6{background: repeating-linear-gradient(-45deg, #5f5037 0 4px, #443923 4px 8px);}
.pat-7{background: repeating-linear-gradient(0deg, #4a6769 0 2px, #35494b 2px 5px);}
.pat-8{background: repeating-linear-gradient(0deg, #2f4a2e 0 2px, #1f3421 2px 4px);}
.pat-9{background: radial-gradient(circle at 50% 30%, #3a2818 2px, transparent 3px) 0 0/8px 8px, #5a3c1f;}
.pat-10{background: linear-gradient(0deg, #141414, #2a2a2a);}
.pat-11{background: repeating-linear-gradient(0deg, #c2b083 0 3px, #a59064 3px 6px);}

/* Horizontal rule like a chapter divider */
.rule-orn{
  display:flex; align-items:center; gap:14px; color:var(--ink-soft);
}
.rule-orn::before,.rule-orn::after{
  content:""; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, var(--ink-soft), transparent);
}

/* Compass rose */
.compass-mini{
  width: 74px; height: 74px;
  position:relative;
}

/* Old-style page numbers */
.folio{
  font-family:'IM Fell English', serif;
  font-variant-numeric: oldstyle-nums;
  letter-spacing:.1em;
  color:var(--ink-soft);
}

/* Responsive guard */
@media (max-width: 900px){
  .strat-nav{ left: 4px; width: 48px;}
  .strat-nav .item{ font-size:8px;}
  .strat-nav .item .lbl{ font-size:7px;}
}

/* Scroll cue */
.scroll-cue{
  position:absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  color: var(--ink-soft);
  font-family:'Ma Shan Zheng', cursive;
  animation: bob 2.2s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:translate(-50%,0);}
  50%{transform:translate(-50%,8px);}
}

/* Content styling helpers */
.leaf h2{
  font-family:'ZCOOL XiaoWei', serif;
  color:var(--ink);
  font-size: clamp(28px, 3.6vw, 46px);
  line-height:1.1;
  margin: 0;
}
.leaf h3{
  font-family:'Ma Shan Zheng', cursive;
  color:var(--ink-soft);
  font-size: 20px;
  margin: 0;
}
.leaf p{
  line-height: 1.95;
  font-size: 16px;
  color: var(--ink);
  text-align: justify;
  letter-spacing: .015em;
}

/* Numeric emphasis */
.num{
  font-family:'IM Fell English', serif;
  color: var(--rust-deep);
  font-weight: 500;
}

/* Card label for specimens */
.samp-label{
  font-family:'Special Elite', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: .08em;
  line-height: 1.5;
}

/* Rough pen stroke for decorative signatures */
.sig{
  font-family:'Liu Jian Mao Cao', cursive;
  color: var(--iron);
  font-size: 28px;
  line-height: 1;
}

/* Flicker for the final numeric c */
@keyframes cTick{
  0%,94%{opacity:1;}
  95%{opacity:.55;}
  100%{opacity:1;}
}
.ctick{ animation: cTick 3.8s steps(1) infinite; }

/* Hover lift for interactive sketches */
.lift{ transition: transform .35s ease, filter .35s ease; }
.lift:hover{ transform: translateY(-3px) rotate(-.3deg); filter: brightness(1.02); }

/* Rolling hill diagram bg */
.parch{
  background:
    radial-gradient(ellipse at center, rgba(255,240,210,.3), transparent 70%),
    linear-gradient(#e9d9b4,#d4bf8c);
  border: 1px solid rgba(80,60,38,.25);
  box-shadow: inset 0 0 40px rgba(100,70,30,.12);
}

/* Vertical measuring ruler edge */
.ruler{
  position:absolute;
  right: -2px; top: 30px; bottom: 30px;
  width: 14px;
  background:
    linear-gradient(rgba(80,60,38,.25), rgba(80,60,38,.25)) left/1px 100% no-repeat,
    repeating-linear-gradient(0deg,
      transparent 0 18px,
      rgba(80,60,38,.35) 18px 19px,
      transparent 19px 36px,
      rgba(80,60,38,.35) 36px 37px);
  font-family:'Special Elite', monospace;
  font-size:7px; color: var(--ink-soft);
  pointer-events:none;
}

.hairline{border-top:1px solid rgba(80,60,38,.28);}
</style>
</head>
<body>

<!-- Global SVG filters -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
    </filter>
    <filter id="roughen-soft">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.3"/>
    </filter>
    <filter id="inkbleed">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
  </defs>
</svg>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// --------- STRATA DATA ---------
const strata = [
  { id: "cover",    yr: "序",    lbl: "扉",     pat: "pat-11", depth: "—"},
  { id: "s1-ancient", yr:"-450",  lbl: "臆",     pat: "pat-1",  depth: "I"},
  { id: "s2-alhazen", yr:"1021",  lbl: "光",     pat: "pat-2",  depth: "II"},
  { id: "s3-galileo", yr:"1638",  lbl: "灯",     pat: "pat-3",  depth: "III"},
  { id: "s4-romer",   yr:"1676",  lbl: "木",     pat: "pat-4",  depth: "IV"},
  { id: "s5-bradley", yr:"1729",  lbl: "星",     pat: "pat-5",  depth: "V"},
  { id: "s6-fizeau",  yr:"1849",  lbl: "齿",     pat: "pat-6",  depth: "VI"},
  { id: "s7-foucault",yr:"1862",  lbl: "镜",     pat: "pat-7",  depth: "VII"},
  { id: "s8-mm",      yr:"1887",  lbl: "涉",     pat: "pat-8",  depth: "VIII"},
  { id: "s9-einstein",yr:"1905",  lbl: "洛",     pat: "pat-9",  depth: "IX"},
  { id: "s10-modern", yr:"1983",  lbl: "定",     pat: "pat-10", depth: "X"},
  { id: "colophon",   yr: "跋",   lbl: "跋",     pat: "pat-11", depth: "—"},
];

// --------- NAV ---------
function StratNav({active, onJump}){
  return (
    <div className="strat-nav" style={{zIndex:50}}>
      <div style={{fontFamily:"'IM Fell English',serif", fontSize:9, textAlign:"center", color:"var(--ink-soft)", padding:"4px 0 4px", borderBottom:"1px dashed rgba(80,60,38,.3)", letterSpacing:".1em"}}>
        STRATA
      </div>
      {strata.map((s,i)=>(
        <div key={s.id}
             className={"item " + (active===i?"active":"")}
             onClick={()=>onJump(s.id)}
             title={s.yr}>
          <div className={"strat-pat " + s.pat}></div>
          <div style={{paddingLeft:12}}>
            <div className="yr">{s.yr}</div>
            <div className="lbl">{s.lbl}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// --------- DECORATIVE ---------
function CompassMini({size=74}){
  return (
    <svg viewBox="0 0 100 100" width={size} height={size}>
      <circle cx="50" cy="50" r="44" fill="none" stroke="var(--ink-soft)" strokeWidth="1"/>
      <circle cx="50" cy="50" r="38" fill="none" stroke="var(--ink-soft)" strokeWidth=".6" strokeDasharray="2 3"/>
      <g stroke="var(--ink-soft)" strokeWidth=".6">
        {[0,30,60,90,120,150,180,210,240,270,300,330].map(a=>{
          const x1=50+Math.cos(a*Math.PI/180)*38;
          const y1=50+Math.sin(a*Math.PI/180)*38;
          const x2=50+Math.cos(a*Math.PI/180)*44;
          const y2=50+Math.sin(a*Math.PI/180)*44;
          return <line key={a} x1={x1} y1={y1} x2={x2} y2={y2}/>;
        })}
      </g>
      <polygon points="50,10 54,50 50,46 46,50" fill="var(--rust)" stroke="var(--rust-deep)" strokeWidth=".5"/>
      <polygon points="50,90 54,50 50,54 46,50" fill="var(--ink-soft)" stroke="var(--ink)" strokeWidth=".5" opacity=".7"/>
      <text x="50" y="8" fontFamily="IM Fell English" fontSize="9" textAnchor="middle" fill="var(--rust-deep)">N</text>
      <text x="50" y="98" fontFamily="IM Fell English" fontSize="9" textAnchor="middle" fill="var(--ink-soft)">S</text>
      <text x="94" y="53" fontFamily="IM Fell English" fontSize="9" textAnchor="middle" fill="var(--ink-soft)">E</text>
      <text x="6" y="53" fontFamily="IM Fell English" fontSize="9" textAnchor="middle" fill="var(--ink-soft)">W</text>
      <circle cx="50" cy="50" r="2" fill="var(--ink)"/>
    </svg>
  );
}

function OrnamentalDivider(){
  return (
    <svg viewBox="0 0 300 20" width="220" height="18" style={{display:"block", margin:"0 auto"}}>
      <g stroke="var(--ink-soft)" strokeWidth="1" fill="none">
        <path d="M10 10 L130 10"/>
        <path d="M170 10 L290 10"/>
        <circle cx="150" cy="10" r="4"/>
        <circle cx="150" cy="10" r="1.2" fill="var(--rust)"/>
        <path d="M132 10 q6 -6 12 0 q-6 6 -12 0 z" fill="var(--ink-soft)" opacity=".8"/>
        <path d="M168 10 q-6 -6 -12 0 q6 6 12 0 z" fill="var(--ink-soft)" opacity=".8"/>
      </g>
    </svg>
  );
}

// Tape placed relative to a parent
function Tape({style, cls=""}){
  return <div className={"tape " + cls} style={style}/>;
}

// Pinhole pins
function Pin({x,y,color="var(--rust)"}){
  return (
    <svg style={{position:"absolute", left:x, top:y, pointerEvents:"none"}} width="18" height="18" viewBox="0 0 20 20">

// ====== LAYER 4 — Rømer ======
function Layer4(){
  const [off, setOff] = useState(0); // earth orbital phase
  useEffect(()=>{
    const t = setInterval(()=>setOff(o=>(o+1)%360), 60);
    return ()=>clearInterval(t);
  },[]);
  // Earth orbits sun at (240,150) with semi-axes matching drawn ellipse
  const cxSun = 240, cySun = 150;
  const ex = cxSun + Math.cos(off*Math.PI/180)*90;
  const ey = cySun + Math.sin(off*Math.PI/180)*54;
  // Jupiter at (70,150)
  const jx = 70, jy = 150;
  const dist = Math.hypot(ex-jx, ey-jy);
  // dist ranges ≈ 80 (nearest) to 260 (farthest), range 180
  const delayMin = ((dist - 80)/180)*16;

  return (
    <section id="s4-romer" style={{padding:"40px 40px 100px"}}>
      <div className="mx-auto" style={{maxWidth:1020}}>
        <div className="leaf drift relative" style={{padding:"52px 56px", "--r":".3deg", transform:"rotate(.3deg)"}}>

              </p>

                  <text x="260" y="-4" fontFamily="Special Elite" fontSize="9" fill="var(--rust-deep)" textAnchor="end">

            </div>
          </div>

// ====== MAIN APP ======
function App(){
  const [active, setActive] = useState(0);

  useEffect(()=>{
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const idx = strata.findIndex(s=>s.id===e.target.id);
          if(idx>=0) setActive(idx);
        }
      });
    }, {rootMargin:"-40% 0px -40% 0px"});
    document.querySelectorAll("section[id]").forEach(s=>io.observe(s));
    return ()=>io.disconnect();
  },[]);

  const jump = (id)=>{
    const el = document.getElementById(id);
    if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
  };

  return (
    <div style={{position:"relative", zIndex:3}}>
      <StratNav active={active} onJump={jump}/>
      <Cover/>
      <StratIndex/>
      <Layer1/>
      <Layer2/>
      <Layer3/>
      <Layer4/>
      <Layer5/>
      <Layer6/>
      <Layer7/>
      <Layer8/>
      <Layer9/>
      <Layer10/>
      <Colophon/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
