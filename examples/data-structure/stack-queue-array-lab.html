                                <tr>
                                    <td>弹栈 pop</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>top 自减，元素逻辑上废弃</td>
                                </tr>
                                <tr>
                                    <td>取栈顶 peek</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>仅读取，不改动 top</td>
                                </tr>
                                <tr>
                                    <td>按值查找</td>
                                    <td className="c-good">O(1)</td><td className="c-bad">O(n)</td><td className="c-bad">O(n)</td>
                                    <td>需破坏栈序或借助辅助栈</td>
                                </tr>
                                <tr>
                                    <td>清空 clear</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>顺序栈令 top = −1 即可</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="traits-grid">
                        <div className="trait">
                            <div className="trait-num">TRAIT · 01</div>
                            <div className="trait-title">后进先出</div>
                            <div className="trait-desc">最后压入的元素最先被弹出，栈序永远与入栈顺序相反——此谓 LIFO 的契约。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 02</div>
                            <div className="trait-title">单端开口</div>
                            <div className="trait-desc">所有操作仅作用于栈顶一处，简化了并发控制与实现成本，却也限制了可达性。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 03</div>
                            <div className="trait-title">递归之器</div>
                            <div className="trait-desc">函数调用、表达式求值、DFS 回溯皆以栈为支撑。它天生用来记住"去过的路"。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 04</div>
                            <div className="trait-title">容量约束</div>
                            <div className="trait-desc">顺序栈受限于预分配空间。过深的递归会触发栈溢出（stack overflow）。</div>
                        </div>
                    </section>
                </>
            );
        }

        /* ═════════════════════════════════════════════════════════════════════
           Specimen 02 · Circular Queue  (循环队列)
           ═════════════════════════════════════════════════════════════════════ */
        const QU_CAPACITY = 8;     // 实际存储空间
        const QU_CELL_W = 62;
        const QU_GAP = 4;

        function QueueModule() {
            // 以定长数组 + front/rear 指针 + 留一空位 的经典循环队列实现
            const [cells, setCells] = useState(() => {
                const arr = Array(QU_CAPACITY).fill(null);
                arr[0] = 42; arr[1] = 17; arr[2] = 89; arr[3] = 3;
                return arr;
            });
            const [front, setFront] = useState(0);
            const [rear, setRear] = useState(4);
            const [freshIdx, setFreshIdx] = useState(null);
            const [hl, setHl] = useState(null);
            const [log, pushLog, clearLog] = useLog();

            const [valIn, setValIn] = useState('');
            const [searchIn, setSearchIn] = useState('');

            const parsedVal = () => {
                const v = parseInt(valIn, 10);
                return Number.isNaN(v) ? Math.floor(Math.random() * 99) + 1 : v;
            };

            const isEmpty = front === rear;
            const isFull = (rear + 1) % QU_CAPACITY === front;
            const size = (rear - front + QU_CAPACITY) % QU_CAPACITY;

            const flashFresh = (idx) => {
                setFreshIdx(idx);
                setTimeout(() => setFreshIdx(null), 400);
            };

            const flashHl = (idx, ms = 1100) => {
                setHl(idx);
                setTimeout(() => setHl(null), ms);
            };

            const enqueue = () => {
                if (isFull) {
                    pushLog(`enqueue × 队列已满 · (rear+1) mod n == front`, '—', 'error');
                    return;
                }
                const v = parsedVal();
                const slot = rear;
                setCells(prev => {
                    const next = [...prev];
                    next[slot] = v;
                    return next;
                });
                setRear((rear + 1) % QU_CAPACITY);
                pushLog(`enqueue · ${v} → slot [${slot}] · rear = (rear+1) mod ${QU_CAPACITY}`, 'O(1)', 'success');
                flashFresh(slot);
            };

            const dequeue = () => {
                if (isEmpty) {
                    pushLog(`dequeue × 队列为空 · front == rear`, '—', 'error');
                    return;
                }
                const slot = front;
                const v = cells[slot];
                setHl(slot);
                setTimeout(() => {
                    setCells(prev => {
                        const next = [...prev];
                        next[slot] = null;
                        return next;
                    });
                    setFront((front + 1) % QU_CAPACITY);
                    setHl(null);
                }, 240);
                pushLog(`dequeue · ${v} ← slot [${slot}] · front = (front+1) mod ${QU_CAPACITY}`, 'O(1)', 'success');
            };

            const peekFront = () => {
                if (isEmpty) {
                    pushLog(`peek-front × 队空`, '—', 'error');
                    return;
                }
                pushLog(`peek-front · 队头 = ${cells[front]} · slot [${front}]`, 'O(1)', 'info');
                flashHl(front);
            };

            const peekRear = () => {
                if (isEmpty) {
                    pushLog(`peek-rear × 队空`, '—', 'error');
                    return;
                }
                const lastIdx = (rear - 1 + QU_CAPACITY) % QU_CAPACITY;
                pushLog(`peek-rear · 队尾 = ${cells[lastIdx]} · slot [${lastIdx}]`, 'O(1)', 'info');
                flashHl(lastIdx);
            };

            const search = (val) => {
                const target = parseInt(val, 10);
                if (Number.isNaN(target)) {
                    pushLog(`search × 请输入数值`, '—', 'error');
                    return;
                }
                if (isEmpty) {
                    pushLog(`search × 队空`, '—', 'error');
                    return;
                }
                let k = 0;
                const step = () => {
                    if (k >= size) {
                        pushLog(`search ${target} × 未找到 · 扫描 ${size} 次`, 'O(n)', 'info');
                        setHl(null);
                        return;
                    }
                    const cur = (front + k) % QU_CAPACITY;
                    setHl(cur);
                    if (cells[cur] === target) {
                        pushLog(`search ${target} ✓ 逻辑位置 ${k} · 物理 slot [${cur}]`, 'O(n)', 'success');
                        setTimeout(() => setHl(null), 800);
                        return;
                    }
                    k += 1;
                    setTimeout(step, 240);
                };
                step();
            };

            const clear = () => {
                setCells(Array(QU_CAPACITY).fill(null));
                setFront(0);
                setRear(0);
                pushLog(`clear · 队列清空 · front = rear = 0`, 'O(1)', 'success');
            };

            const reset = () => {
                const arr = Array(QU_CAPACITY).fill(null);
                arr[0] = 42; arr[1] = 17; arr[2] = 89; arr[3] = 3;
                setCells(arr);
                setFront(0);
                setRear(4);
                pushLog(`reset · 恢复初始状态`, '—', 'info');
            };

            const totalWidth = QU_CAPACITY * (QU_CELL_W + QU_GAP) - QU_GAP;
            const ptrLeft = (slot) => slot * (QU_CELL_W + QU_GAP);
            const overlap = front === rear;

            // 合成占据关系（用于渲染高亮的队列成员）
            const inQueue = (idx) => {
                if (isEmpty) return false;
                if (front < rear) return idx >= front && idx < rear;
                return idx >= front || idx < rear;
            };

            return (
                <>
                    <section className="module-intro">
                        <aside className="module-intro-side">
                            <div><strong>SPECIMEN</strong> 02 / 03</div>
                            <div><strong>TYPE</strong> FIFO · Ring</div>
                            <div><strong>CAPACITY</strong> {QU_CAPACITY}</div>
                            <div><strong>USABLE</strong> {QU_CAPACITY - 1}</div>
                            <div><strong>SIZE</strong> <span style={{ color: 'var(--accent)' }}>{size}</span></div>
                        </aside>
                        <div className="module-intro-body">
                            <p>队列用两条规则镇守两端：一端进、一端出。进者在后，出者在前——任何元素都必须按到达的顺序依次离场，此谓"先进先出"（FIFO）的公平与耐心。</p>
                            <p>为避免线性队列在反复出入后越过数组边界，工程上以取模的方式把两端连成环，这便是循环队列。一位槽被特意留作空位，用以区分"空"与"满"——前者 front == rear，后者 (rear+1) mod n == front。</p>
                        </div>
                        <aside className="module-intro-side" style={{ textAlign: 'right' }}>
                            <div><strong>ENQUEUE</strong> O(1)</div>
                            <div><strong>DEQUEUE</strong> O(1)</div>
                            <div><strong>FRONT</strong> <span style={{ color: 'var(--accent)' }}>[{front}]</span></div>
                            <div><strong>REAR</strong> <span style={{ color: 'var(--ink)' }}>[{rear}]</span></div>
                            <div><strong>STATUS</strong> <span style={{ color: 'var(--accent)' }}>{isFull ? 'FULL' : isEmpty ? 'EMPTY' : '—'}</span></div>
                        </aside>
                    </section>

                    <section className="viz-panel">
                        <span className="viz-corner bl" />
                        <span className="viz-corner br" />
                        <span className="viz-label">FIG. 02 · RING TOPOLOGY</span>
                        <span className="viz-label-right">
                            SIZE {size} / {QU_CAPACITY - 1}
                        </span>

                        <div className="viz-canvas-wrap">
                            <div className="qu-outer">
                                <div className="qu-container" style={{ width: totalWidth }}>
                                    {/* FRONT 指针 */}
                                    {!overlap && (
                                        <div className="qu-ptr" style={{ left: ptrLeft(front) }}>
                                            <span className="qu-ptr-text">FRONT</span>
                                            <span className="qu-ptr-arrow" />
                                        </div>
                                    )}
                                    {/* REAR 指针 */}
                                    {!overlap && (
                                        <div className="qu-ptr rear" style={{ left: ptrLeft(rear) }}>
                                            <span className="qu-ptr-text">REAR</span>
                                            <span className="qu-ptr-arrow" />
                                        </div>
                                    )}
                                    {/* 重叠状态：front == rear */}
                                    {overlap && (
                                        <div className="qu-ptr overlap" style={{ left: ptrLeft(front) }}>
                                            <span className="qu-ptr-text">
                                                <span>FRONT</span>
                                                <span>REAR</span>
                                            </span>
                                            <span className="qu-ptr-arrow" />
                                        </div>
                                    )}

                                    {/* 单元格 */}
                                    <div className="qu-cells">
                                        {cells.map((v, idx) => (
                                            <div className="qu-cell-wrap" key={idx}>
                                                <div
                                                    className={[
                                                        'qu-cell',
                                                        v === null ? 'empty' : '',
                                                        hl === idx ? 'hl' : '',
                                                        freshIdx === idx ? 'fresh' : '',
                                                        v !== null && inQueue(idx) ? 'in-queue' : ''
                                                    ].filter(Boolean).join(' ')}
                                                >
                                                    {v !== null ? v : null}
                                                </div>
                                                <div className="qu-idx">[{idx}]</div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 环绕弧线 */}
                                    <svg
                                        className="qu-wrap-svg"
                                        viewBox={`0 0 ${totalWidth} 46`}
                                        preserveAspectRatio="none"
                                    >
                                        <path
                                            d={`M ${totalWidth - QU_CELL_W / 2} 4
                      C ${totalWidth - QU_CELL_W / 2} 40,
                        ${totalWidth / 2} 44,
                        ${QU_CELL_W / 2} 40
                      L ${QU_CELL_W / 2} 4`}
                                        />
                                        {/* 箭头 */}
                                        <path
                                            d={`M ${QU_CELL_W / 2 - 4} 10
                      L ${QU_CELL_W / 2} 4
                      L ${QU_CELL_W / 2 + 4} 10`}
                                            style={{ strokeDasharray: 'none', strokeWidth: 1.5 }}
                                        />
                                        <text x={totalWidth / 2} y="34" textAnchor="middle">
                                            mod · wrap-around
                                        </text>
                                    </svg>
                                </div>

                                {/* 状态指示 */}
                                <div className="qu-status">
                                    <span className={`pill ${isEmpty ? 'active' : ''}`}>
                                        EMPTY · front == rear
                                    </span>
                                    <span className={`pill ${isFull ? 'full' : ''}`}>
                                        FULL · (rear+1) mod n == front
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div className="viz-caption">
                            <span className="fig">FIG. 02</span>
                            <span className="italic">首尾以取模相连——一段有限的数组被折叠为无尽之环。</span>
                        </div>
                    </section>

                    <section className="controls-grid">
                        <div className="control-block">
                            <div className="control-block-title">
                                <span><span className="num">§1</span> &nbsp;OPERATIONS</span>
                                <span>INPUTS ↓</span>
                            </div>

                            <div className="input-row">
                                <label>VALUE</label>
                                <input
                                    className="lab-input"
                                    value={valIn}
                                    onChange={e => setValIn(e.target.value)}
                                    placeholder="留空则随机"
                                />
                            </div>

                            <div style={{ height: 6 }} />

                            <div className="btn-grid">
                                <button className="lab-btn accent" onClick={enqueue}>
                                    <span>入队 ENQUEUE</span><span className="sym">+→</span>
                                </button>
                                <button className="lab-btn danger" onClick={dequeue}>
                                    <span>出队 DEQUEUE</span><span className="sym">→−</span>
                                </button>
                                <button className="lab-btn" onClick={peekFront}>
                                    <span>查看队头</span><span className="sym">◎←</span>
                                </button>
                                <button className="lab-btn" onClick={peekRear}>
                                    <span>查看队尾</span><span className="sym">◎→</span>
                                </button>
                            </div>

                            <div style={{ height: 16 }} />
                            <div className="input-row">
                                <label>SEARCH</label>
                                <input
                                    className="lab-input"
                                    value={searchIn}
                                    onChange={e => setSearchIn(e.target.value)}
                                    placeholder="从队头开始扫描"
                                />
                                <button className="lab-btn" onClick={() => search(searchIn)} style={{ flex: '0 0 130px' }}>
                                    <span>顺序查找</span><span className="sym">◎</span>
                                </button>
                            </div>

                            <div style={{ height: 8 }} />
                            <div className="btn-grid">
                                <button className="lab-btn danger" onClick={clear}>
                                    <span>清空 CLEAR</span><span className="sym">∅</span>
                                </button>
                                <button className="lab-btn" onClick={reset}>
                                    <span>恢复初始 RESET</span><span className="sym">↺</span>
                                </button>
                            </div>
                        </div>

                        <LogPanel log={log} onClear={clearLog} num="§2" />
                    </section>

                    <section className="complexity-block">
                        <div className="complexity-title">
                            <h3>时间复杂度 <span className="flourish">summary</span></h3>
                            <span className="num">§3 · COMPLEXITY</span>
                        </div>
                        <table className="complexity-table">
                            <thead>
                                <tr>
                                    <th>操作 Operation</th>
                                    <th>最好 Best</th>
                                    <th>平均 Avg.</th>
                                    <th>最坏 Worst</th>
                                    <th>备注 Note</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>入队 enqueue</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>rear 指针前移一位 (mod n)</td>
                                </tr>
                                <tr>
                                    <td>出队 dequeue</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>front 指针前移一位 (mod n)</td>
                                </tr>
                                <tr>
                                    <td>取队头 / 队尾</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>直接通过指针访问</td>
                                </tr>
                                <tr>
                                    <td>判空 / 判满</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>front、rear 的代数比较</td>
                                </tr>
                                <tr>
                                    <td>按值查找</td>
                                    <td className="c-good">O(1)</td><td className="c-bad">O(n)</td><td className="c-bad">O(n)</td>
                                    <td>自 front 顺时针线性扫描</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="traits-grid">
                        <div className="trait">
                            <div className="trait-num">TRAIT · 01</div>
                            <div className="trait-title">先进先出</div>
                            <div className="trait-desc">进场顺序即出场顺序——从不越位，从不插队。FIFO 契约用耐心换得公平。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 02</div>
                            <div className="trait-title">双端异步</div>
                            <div className="trait-desc">头尾两枚指针各管一端，互不干扰——这使得并发生产/消费成为可能。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 03</div>
                            <div className="trait-title">循环复用</div>
                            <div className="trait-desc">一段定长数组通过取模被折叠成环，空间得以反复利用，无须挪动已存元素。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 04</div>
                            <div className="trait-title">一位留空</div>
                            <div className="trait-desc">特意牺牲一个槽位，用 front、rear 的位置关系干净地区分"空"与"满"。</div>
                        </div>
                    </section>
                </>
            );
        }

        /* ═════════════════════════════════════════════════════════════════════
           Specimen 03 · 2D Array  (二维数组)
           ═════════════════════════════════════════════════════════════════════ */
        const A2_ROWS = 3;
        const A2_COLS = 4;
        const A2_BASE = 0x1000;  // 起始地址（示意）
        const A2_SIZEOF = 4;     // 每元素字节数（int）

        function Array2DModule() {
            const [grid, setGrid] = useState(() => [
                [12, 45, 78, 23],
                [56, 34, 91, 17],
                [89, 4, 62, 50],
            ]);
            const [sel, setSel] = useState({ i: 0, j: 0 }); // 当前选中
            const [hl, setHl] = useState(null);             // { i, j } 临时高亮
            const [mode, setMode] = useState('row');        // row | col (优先)
            const [tracedRow, setTracedRow] = useState(null);
            const [tracedCol, setTracedCol] = useState(null);
            const [log, pushLog, clearLog] = useLog();

            const [iIn, setIIn] = useState('');
            const [jIn, setJIn] = useState('');
            const [valIn, setValIn] = useState('');
            const [searchIn, setSearchIn] = useState('');

            const parsedI = () => {
                const v = parseInt(iIn, 10);
                return Number.isNaN(v) ? sel.i : v;
            };
            const parsedJ = () => {
                const v = parseInt(jIn, 10);
                return Number.isNaN(v) ? sel.j : v;
            };
            const parsedVal = () => {
                const v = parseInt(valIn, 10);
                return Number.isNaN(v) ? Math.floor(Math.random() * 99) + 1 : v;
            };

            // 线性化：根据 mode 返回 (i, j) -> 一维下标 k
            const lin = (i, j) => (mode === 'row' ? i * A2_COLS + j : j * A2_ROWS + i);

            const flashHl = (i, j, ms = 1100) => {
                setHl({ i, j });
                setTimeout(() => setHl(null), ms);
            };

            const access = (i, j) => {
                if (i < 0 || i >= A2_ROWS || j < 0 || j >= A2_COLS) {
                    pushLog(`access × 下标越界 (${i}, ${j})`, '—', 'error');
                    return;
                }
                const v = grid[i][j];
                const k = lin(i, j);
                const addr = A2_BASE + k * A2_SIZEOF;
                setSel({ i, j });
                setTracedRow(null);
                setTracedCol(null);
                pushLog(
                    `access (${i},${j}) = ${v} · k=${k} · addr=0x${addr.toString(16).toUpperCase()}`,
                    'O(1)',
                    'success'
                );
                flashHl(i, j);
            };

            const setValueAt = (i, j) => {
                if (i < 0 || i >= A2_ROWS || j < 0 || j >= A2_COLS) {
                    pushLog(`assign × 下标越界 (${i}, ${j})`, '—', 'error');
                    return;
                }
                const v = parsedVal();
                setGrid(prev => prev.map((row, ri) =>
                    ri === i ? row.map((old, ci) => (ci === j ? v : old)) : row
                ));
                setSel({ i, j });
                pushLog(`assign (${i},${j}) ← ${v} · 原地写入`, 'O(1)', 'success');
                flashHl(i, j);
            };

            const search = (val) => {
                const target = parseInt(val, 10);
                if (Number.isNaN(target)) {
                    pushLog(`search × 请输入数值`, '—', 'error');
                    return;
                }
                // 按 mode 的顺序进行线性扫描，动画展示
                const total = A2_ROWS * A2_COLS;
                let k = 0;
                const step = () => {
                    if (k >= total) {
                        pushLog(`search ${target} × 未找到 · 扫描 ${total} 格`, 'O(n·m)', 'info');
                        setHl(null);
                        return;
                    }
                    const i = (mode === 'row') ? Math.floor(k / A2_COLS) : k % A2_ROWS;
                    const j = (mode === 'row') ? k % A2_COLS : Math.floor(k / A2_ROWS);
                    setHl({ i, j });
                    if (grid[i][j] === target) {
                        pushLog(
                            `search ${target} ✓ (${i},${j}) · 步数 ${k + 1} · ${mode === 'row' ? '行优先' : '列优先'}`,
                            'O(n·m)',
                            'success'
                        );
                        setSel({ i, j });
                        setTimeout(() => setHl(null), 800);
                        return;
                    }
                    k += 1;
                    setTimeout(step, 130);
                };
                step();
            };

            const traceRow = (i) => {
                if (i < 0 || i >= A2_ROWS) {
                    pushLog(`trace-row × 行越界 i=${i}`, '—', 'error');
                    return;
                }
                setTracedRow(i);
                setTracedCol(null);
                pushLog(
                    `trace · 行 [${i}] · ${mode === 'row' ? '内存连续' : '跨行跳跃 · 步长 ' + A2_ROWS}`,
                    'O(m)',
                    'info'
                );
            };

            const traceCol = (j) => {
                if (j < 0 || j >= A2_COLS) {
                    pushLog(`trace-col × 列越界 j=${j}`, '—', 'error');
                    return;
                }
                setTracedCol(j);
                setTracedRow(null);
                pushLog(
                    `trace · 列 [${j}] · ${mode === 'col' ? '内存连续' : '跨列跳跃 · 步长 ' + A2_COLS}`,
                    'O(n)',
                    'info'
                );
            };

            const reset = () => {
                setGrid([
                    [12, 45, 78, 23],
                    [56, 34, 91, 17],
                    [89, 4, 62, 50],
                ]);
                setSel({ i: 0, j: 0 });
                setTracedRow(null);
                setTracedCol(null);
                pushLog(`reset · 恢复初始状态`, '—', 'info');
            };

            // 构造线性化视图
            const linearView = useMemo(() => {
                const out = [];
                if (mode === 'row') {
                    for (let i = 0; i < A2_ROWS; i += 1) {
                        for (let j = 0; j < A2_COLS; j += 1) {
                            out.push({ i, j, v: grid[i][j], k: i * A2_COLS + j });
                        }
                    }
                } else {
                    for (let j = 0; j < A2_COLS; j += 1) {
                        for (let i = 0; i < A2_ROWS; i += 1) {
                            out.push({ i, j, v: grid[i][j], k: j * A2_ROWS + i });
                        }
                    }
                }
                return out;
            }, [grid, mode]);

            const selK = lin(sel.i, sel.j);
            const selAddr = A2_BASE + selK * A2_SIZEOF;

            return (
                <>
                    <section className="module-intro">
                        <aside className="module-intro-side">
                            <div><strong>SPECIMEN</strong> 03 / 03</div>
                            <div><strong>TYPE</strong> 2D · Contiguous</div>
                            <div><strong>SHAPE</strong> {A2_ROWS} × {A2_COLS}</div>
                            <div><strong>TOTAL</strong> {A2_ROWS * A2_COLS}</div>
                            <div><strong>ORDER</strong> <span style={{ color: 'var(--accent)' }}>{mode === 'row' ? 'ROW-MAJOR' : 'COL-MAJOR'}</span></div>
                        </aside>
                        <div className="module-intro-body">
                            <p>数组是最古老也最直接的结构——一组同类元素按顺序紧密排列。无论它对外呈现为几维，在存储器中它始终是一段连续的字节流，既无裂缝，也无指针。</p>
                            <p>多维数组的每一个坐标都通过一次线性化运算被折叠进一维：以行优先为例，(i, j) 被映射到 i·cols + j。这使得任意位置的访问仍然只需一次偏移计算，保留了数组最珍贵的禀赋——常数时间的随机存取。</p>
                        </div>
                        <aside className="module-intro-side" style={{ textAlign: 'right' }}>
                            <div><strong>ACCESS</strong> O(1)</div>
                            <div><strong>ASSIGN</strong> O(1)</div>
                            <div><strong>SEARCH</strong> O(n·m)</div>
                            <div><strong>BASE</strong> 0x{A2_BASE.toString(16).toUpperCase()}</div>
                            <div><strong>SIZEOF</strong> {A2_SIZEOF} B</div>
                        </aside>
                    </section>

                    <section className="viz-panel">
                        <span className="viz-corner bl" />
                        <span className="viz-corner br" />
                        <span className="viz-label">FIG. 03 · MATRIX & LINEARIZATION</span>
                        <span className="viz-label-right">
                            SEL (<span>{sel.i}</span>,<span>{sel.j}</span>) · k = {selK}
                        </span>

                        <div className="viz-canvas-wrap">
                            <div className="a2-outer">
                                {/* 二维网格 */}
                                <div className="a2-grid-wrap">
                                    <div style={{ width: 28 }} />
                                    <div>
                                        {/* 列标签 */}
                                        <div
                                            className="a2-col-labels"
                                            style={{ gridTemplateColumns: `repeat(${A2_COLS}, 64px)` }}
                                        >
                                            {Array.from({ length: A2_COLS }).map((_, j) => (
                                                <span key={j}>j = {j}</span>
                                            ))}
                                        </div>

                                        {/* 行 */}
                                        <div className="a2-grid-rowwise">
                                            {grid.map((row, i) => (
                                                <div className="a2-row-block" key={i}>
                                                    <div className="a2-row-label">i = {i}</div>
                                                    <div className="a2-row">
                                                        {row.map((v, j) => {
                                                            const isSel = sel.i === i && sel.j === j;
                                                            const isHl = hl && hl.i === i && hl.j === j;
                                                            const isTraced = tracedRow === i || tracedCol === j;
                                                            return (
                                                                <div
                                                                    key={j}
                                                                    className={[
                                                                        'a2-cell',
                                                                        isHl ? 'hl' : '',
                                                                        !isHl && isSel ? 'hl' : '',
                                                                        !isHl && !isSel && isTraced ? 'trace' : '',
                                                                    ].filter(Boolean).join(' ')}
                                                                    onClick={() => access(i, j)}
                                                                >
                                                                    <span className="a2-cell-idx">[{i},{j}]</span>
                                                                    {v}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* 线性化展示 */}
                                <div className="a2-linear-block">
                                    <div className="a2-linear-title">
                                        <span>§ 线性化存储 · MEMORY ORDER</span>
                                        <span className="mode-toggle">
                                            <button
                                                className={mode === 'row' ? 'active' : ''}
                                                onClick={() => setMode('row')}
                                            >Row · 行优先</button>
                                            <button
                                                className={mode === 'col' ? 'active' : ''}
                                                onClick={() => setMode('col')}
                                            >Col · 列优先</button>
                                        </span>
                                    </div>

                                    <div className="a2-linear-strip">
                                        {linearView.map(cell => {
                                            const isSel = sel.i === cell.i && sel.j === cell.j;
                                            const isHl = hl && hl.i === cell.i && hl.j === cell.j;
                                            const isTraced = tracedRow === cell.i || tracedCol === cell.j;
                                            return (
                                                <div
                                                    key={`${cell.i}-${cell.j}`}
                                                    className={[
                                                        'a2-linear-cell',
                                                        isHl ? 'hl' : '',
                                                        !isHl && isSel ? 'hl' : '',
                                                        !isHl && !isSel && isTraced ? 'trace' : '',
                                                    ].filter(Boolean).join(' ')}
                                                >
                                                    <span className="k">k = {cell.k}</span>
                                                    {cell.v}
                                                </div>
                                            );
                                        })}
                                    </div>

                                    <div className="a2-addr">
                                        <span className="lbl">§ ADDRESS FORMULA · 地址计算</span>
                                        <span className="formula">
                                            {mode === 'row' ? (
                                                <>addr(i, j) = base + (<span className="em">i</span> × cols + <span className="em">j</span>) × sizeof(T)</>
                                            ) : (
                                                <>addr(i, j) = base + (<span className="em">j</span> × rows + <span className="em">i</span>) × sizeof(T)</>
                                            )}
                                        </span>
                                        <span className="result">
                                            = 0x{A2_BASE.toString(16).toUpperCase()} + (
                                            {mode === 'row'
                                                ? <>{sel.i} × {A2_COLS} + {sel.j}</>
                                                : <>{sel.j} × {A2_ROWS} + {sel.i}</>}
                                            ) × {A2_SIZEOF}
                                            &nbsp;=&nbsp;
                                            <span className="em">0x{selAddr.toString(16).toUpperCase()}</span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="viz-caption">
                            <span className="fig">FIG. 03</span>
                            <span className="italic">点击上方单元，观察它在线性化存储中被折叠到第几个字节。</span>
                        </div>
                    </section>

                    <section className="controls-grid">
                        <div className="control-block">
                            <div className="control-block-title">
                                <span><span className="num">§1</span> &nbsp;OPERATIONS</span>
                                <span>INPUTS ↓</span>
                            </div>

                            <div className="input-row">
                                <label>ROW · i</label>
                                <input
                                    className="lab-input"
                                    value={iIn}
                                    onChange={e => setIIn(e.target.value)}
                                    placeholder={`0 ~ ${A2_ROWS - 1}`}
                                />
                                <label style={{ width: 70 }}>COL · j</label>
                                <input
                                    className="lab-input"
                                    value={jIn}
                                    onChange={e => setJIn(e.target.value)}
                                    placeholder={`0 ~ ${A2_COLS - 1}`}
                                />
                            </div>

                            <div className="input-row">
                                <label>VALUE</label>
                                <input
                                    className="lab-input"
                                    value={valIn}
                                    onChange={e => setValIn(e.target.value)}
                                    placeholder="赋值时使用 · 留空随机"
                                />
                            </div>

                            <div style={{ height: 6 }} />

                            <div className="btn-grid cols-3">
                                <button className="lab-btn accent" onClick={() => access(parsedI(), parsedJ())}>
                                    <span>读取 ACCESS</span><span className="sym">→</span>
                                </button>
                                <button className="lab-btn" onClick={() => setValueAt(parsedI(), parsedJ())}>
                                    <span>赋值 ASSIGN</span><span className="sym">＝</span>
                                </button>
                                <button className="lab-btn" onClick={() => { setHl(null); setTracedRow(null); setTracedCol(null); pushLog('clear-trace · 清除高亮', '—', 'info'); }}>
                                    <span>清除高亮</span><span className="sym">∅</span>
                                </button>
                                <button className="lab-btn" onClick={() => traceRow(parsedI())}>
                                    <span>追踪整行</span><span className="sym">→→</span>
                                </button>
                                <button className="lab-btn" onClick={() => traceCol(parsedJ())}>
                                    <span>追踪整列</span><span className="sym">↓↓</span>
                                </button>
                                <button className="lab-btn" onClick={() => setMode(mode === 'row' ? 'col' : 'row')}>
                                    <span>切换优先</span><span className="sym">↔</span>
                                </button>
                            </div>

                            <div style={{ height: 16 }} />
                            <div className="input-row">
                                <label>SEARCH</label>
                                <input
                                    className="lab-input"
                                    value={searchIn}
                                    onChange={e => setSearchIn(e.target.value)}
                                    placeholder="按当前优先顺序扫描"
                                />
                                <button className="lab-btn" onClick={() => search(searchIn)} style={{ flex: '0 0 130px' }}>
                                    <span>顺序查找</span><span className="sym">◎</span>
                                </button>
                            </div>

                            <div style={{ height: 8 }} />
                            <button className="lab-btn" onClick={reset} style={{ width: '100%' }}>
                                <span>恢复初始 RESET</span><span className="sym">↺</span>
                            </button>
                        </div>

                        <LogPanel log={log} onClear={clearLog} num="§2" />
                    </section>

                    <section className="complexity-block">
                        <div className="complexity-title">
                            <h3>时间复杂度 <span className="flourish">summary</span></h3>
                            <span className="num">§3 · COMPLEXITY</span>
                        </div>
                        <table className="complexity-table">
                            <thead>
                                <tr>
                                    <th>操作 Operation</th>
                                    <th>最好 Best</th>
                                    <th>平均 Avg.</th>
                                    <th>最坏 Worst</th>
                                    <th>备注 Note</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>按下标访问 (i,j)</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>基址 + 偏移，一次加法一次乘法</td>
                                </tr>
                                <tr>
                                    <td>按下标赋值</td>
                                    <td className="c-good">O(1)</td><td className="c-good">O(1)</td><td className="c-good">O(1)</td>
                                    <td>原地写入，无需位移</td>
                                </tr>
                                <tr>
                                    <td>行遍历 (行优先)</td>
                                    <td className="c-good">O(m)</td><td className="c-good">O(m)</td><td className="c-good">O(m)</td>
                                    <td>内存连续，缓存命中良好</td>
                                </tr>
                                <tr>
                                    <td>列遍历 (行优先)</td>
                                    <td className="c-mid">O(n)</td><td className="c-mid">O(n)</td><td className="c-mid">O(n)</td>
                                    <td>跨行跳跃，缓存不友好</td>
                                </tr>
                                <tr>
                                    <td>按值查找</td>
                                    <td className="c-good">O(1)</td><td className="c-bad">O(n·m)</td><td className="c-bad">O(n·m)</td>
                                    <td>需扫描整个矩阵</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="traits-grid">
                        <div className="trait">
                            <div className="trait-num">TRAIT · 01</div>
                            <div className="trait-title">多维索引</div>
                            <div className="trait-desc">对外以 (i, j, ...) 多维坐标呈现，契合矩阵、图像、张量等天然多维数据的形状。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 02</div>
                            <div className="trait-title">线性化存储</div>
                            <div className="trait-desc">在内存中始终是一段连续字节，多维只是索引形式上的投影，并非真实排布。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 03</div>
                            <div className="trait-title">行优先 / 列优先</div>
                            <div className="trait-desc">C 与 Python 采用行优先，Fortran 与 MATLAB 采用列优先——同一矩阵，两种折叠方式。</div>
                        </div>
                        <div className="trait">
                            <div className="trait-num">TRAIT · 04</div>
                            <div className="trait-title">缓存局部性</div>
                            <div className="trait-desc">顺着主序遍历效率最高；逆主序遍历会频繁触发缓存失效，代价在常数之外被悄悄放大。</div>
                        </div>
                    </section>
                </>
            );
        }

        /* ═════════════════════════════════════════════════════════════════════
           Root
           ═════════════════════════════════════════════════════════════════════ */
        function StackQueueArrayLab() {
            const [tab, setTab] = useState('stack');

            const tabNameCN = tab === 'stack' ? '栈' : tab === 'queue' ? '队列' : '数组';

            return (
                <>
                    <style>{STYLES}</style>
                    <div className="lab-root">
                        <header className="lab-header">
                            <div className="lab-header-top">
                                <div className="lab-volume">
                                    <span className="caps">VOL. 02</span>
                                    <span className="caps">栈 · 队列 · 数组 / STACK · QUEUE · ARRAY</span>
                                </div>
                                <div className="caps">A SPECIMEN STUDY / 2026</div>
                            </div>

                            <div className="lab-title-block">
                                <h1 className="lab-title">
                                    受限线性与 <span className="em">多维延展</span>
                                </h1>
                                <div className="lab-subtitle">
                                    <span className="dot" />
                                    <span>DATA STRUCTURE LABORATORY</span>
                                    <span>·</span>
                                    <span>INTERACTIVE SPECIMENS</span>
                                    <span>·</span>
                                    <span className="italic serif" style={{ fontSize: 14, color: 'var(--ink-soft)' }}>
                                        in restricted &amp; dimensional forms
                                    </span>
                                </div>
                            </div>

                            <div className="lab-header-bottom">
                                <span>§ 本卷 · 栈 · 队列 · 数组</span>
                                <span>三种约束 / 同一内存</span>
                                <span>点击单元 · 观察变化</span>
                            </div>
                        </header>

                        <main className="lab-container">
                            <nav className="lab-tabs">
                                <button
                                    className={`lab-tab ${tab === 'stack' ? 'active' : ''}`}
                                    onClick={() => setTab('stack')}
                                >
                                    <span className="lab-tab-num">SPECIMEN · 01</span>
                                    <span className="lab-tab-name">
                                        栈
                                        <span className="lab-tab-name-en">Stack</span>
                                    </span>
                                </button>
                                <button
                                    className={`lab-tab ${tab === 'queue' ? 'active' : ''}`}
                                    onClick={() => setTab('queue')}
                                >
                                    <span className="lab-tab-num">SPECIMEN · 02</span>
                                    <span className="lab-tab-name">
                                        队列
                                        <span className="lab-tab-name-en">Circular Queue</span>
                                    </span>
                                </button>
                                <button
                                    className={`lab-tab ${tab === 'array' ? 'active' : ''}`}
                                    onClick={() => setTab('array')}
                                >
                                    <span className="lab-tab-num">SPECIMEN · 03</span>
                                    <span className="lab-tab-name">
                                        数组
                                        <span className="lab-tab-name-en">2D Array</span>
                                    </span>
                                </button>
                            </nav>

                            {tab === 'stack' && <StackModule />}
                            {tab === 'queue' && <QueueModule />}
                            {tab === 'array' && <Array2DModule />}

                            <footer className="lab-footer">
                                <span>© DATA STRUCTURE LAB</span>
                                <span className="flourish serif italic" style={{ fontSize: 13, letterSpacing: 0, textTransform: 'none' }}>
                                    fin · {tabNameCN}
                                </span>
                                <span>PLATE {tab === 'stack' ? '01' : tab === 'queue' ? '02' : '03'} / 03</span>
                            </footer>
                        </main>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StackQueueArrayLab />);

    </script>
</body>

</html>
