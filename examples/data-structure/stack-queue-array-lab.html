<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据结构 - 栈、队列和数组</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-900 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useCallback, useMemo } = React;

        /* ────────────────────────────────────────────────────────────────────
           数据结构实验室 · 第二卷 · 栈 · 队列 · 数组
           VOL. 02 — Stack · Queue · Array
           Specimen 01 — Stack           (栈 — LIFO)
           Specimen 02 — Circular Queue  (循环队列 — FIFO)
           Specimen 03 — 2D Array        (二维数组 — Multi-dim)
           ──────────────────────────────────────────────────────────────────── */

        const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap');

:root {
  --cream:        #F1EADA;
  --cream-light:  #F7F2E6;
  --cream-dark:   #E4DBC4;
  --ink:          #1F1B17;
  --ink-soft:     #3A3530;
  --ink-muted:    #7A6F5E;
  --accent:       #C7381A;
  --accent-soft:  #D66B4D;
  --accent-faded: rgba(199, 56, 26, 0.10);
  --line:         #B5A78C;
  --line-soft:    #CEC3A8;
  --paper-grain:  rgba(31, 27, 23, 0.018);
}

* { box-sizing: border-box; }

.lab-root {
  min-height: 100vh;
  background-color: var(--cream);
  color: var(--ink);
  font-family: 'Fraunces', 'Noto Serif SC', Georgia, serif;
  font-feature-settings: "ss01", "ss02";
  position: relative;
  padding-bottom: 80px;
  background-image:
    repeating-linear-gradient(0deg, transparent 0, transparent 3px, var(--paper-grain) 3px, var(--paper-grain) 4px),
    repeating-linear-gradient(90deg, transparent 0, transparent 3px, var(--paper-grain) 3px, var(--paper-grain) 4px);
}

.lab-root::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 10% 0%, rgba(199, 56, 26, 0.04), transparent 40%),
    radial-gradient(ellipse at 100% 100%, rgba(31, 27, 23, 0.04), transparent 40%);
  z-index: 0;
}

.lab-container { max-width: 1160px; margin: 0 auto; padding: 0 48px; position: relative; z-index: 1; }

/* ─── Typography ─── */
.serif   { font-family: 'Fraunces', 'Noto Serif SC', Georgia, serif; }
.mono    { font-family: 'JetBrains Mono', 'Courier New', monospace; }
.italic  { font-style: italic; }

.caps {
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-muted);
}

/* ─── Header ─── */
.lab-header {
  padding: 48px 48px 0;
  max-width: 1160px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.lab-header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--ink);
}

.lab-volume { display: flex; gap: 28px; align-items: baseline; }

.lab-title-block { margin: 40px 0 12px; }

.lab-title {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-weight: 400;
  font-size: 88px;
  line-height: 0.95;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0;
}
.lab-title .em {
  font-style: italic;
  font-weight: 500;
  color: var(--accent);
  font-variation-settings: "opsz" 144;
}

.lab-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 20px;
  display: flex;
  gap: 18px;
  align-items: center;
  letter-spacing: 0.08em;
  flex-wrap: wrap;
}
.lab-subtitle .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); display: inline-block; }

.lab-header-bottom {
  margin-top: 28px;
  padding: 14px 0;
  border-top: 1px solid var(--ink);
  border-bottom: 3px double var(--ink);
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

/* ─── Tabs ─── */
.lab-tabs { display: flex; gap: 0; margin: 48px 0 56px; border-bottom: 1px solid var(--line); }

.lab-tab {
  flex: 1;
  background: transparent;
  border: none;
  padding: 24px 28px;
  cursor: pointer;
  text-align: left;
  border-left: 1px solid var(--line-soft);
  position: relative;
  transition: background 0.25s ease;
  font-family: inherit;
  color: var(--ink-muted);
}
.lab-tab:first-child { border-left: none; }
.lab-tab:hover { background: var(--cream-light); color: var(--ink-soft); }

.lab-tab-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  display: block;
  margin-bottom: 8px;
}
.lab-tab-name {
  font-family: 'Fraunces', 'Noto Serif SC', serif;
  font-size: 32px;
  line-height: 1;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.lab-tab-name-en {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 18px;
  color: var(--ink-muted);
  margin-left: 10px;
}

.lab-tab.active {
  color: var(--ink);
  background: var(--cream-light);
}
.lab-tab.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 3px;
  background: var(--accent);
}
.lab-tab.active .lab-tab-num { color: var(--accent); }
.lab-tab.active .lab-tab-name-en { color: var(--accent-soft); }

/* ─── Module Intro ─── */
.module-intro {
  display: grid;
  grid-template-columns: 180px 1fr 200px;
  gap: 48px;
  padding-bottom: 48px;
  margin-bottom: 56px;
  border-bottom: 1px solid var(--line-soft);
}

.module-intro-side {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  line-height: 1.9;
}
.module-intro-side strong {
  color: var(--ink);
  font-weight: 500;
  display: block;
  margin-bottom: 3px;
}

.module-intro-body p {
  font-size: 17px;
  line-height: 1.7;
  color: var(--ink-soft);
  margin: 0 0 14px;
}
.module-intro-body p:first-child::first-letter {
  font-family: 'Fraunces', serif;
  font-size: 58px;
  font-weight: 500;
  font-style: italic;
  color: var(--accent);
  float: left;
  line-height: 0.9;
  padding: 6px 10px 0 0;
}

/* ─── Viz Panel ─── */
.viz-panel {
  position: relative;
  padding: 64px 48px 56px;
  background: var(--cream-light);
  margin-bottom: 56px;
}

.viz-panel::before,
.viz-panel::after,
.viz-corner {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  border: 1px solid var(--ink);
}
.viz-panel::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.viz-panel::after  { top: -1px; right: -1px; border-left: none; border-bottom: none; }
.viz-corner.bl { bottom: -1px; left: -1px; top: auto; border-right: none; border-top: none; }
.viz-corner.br { bottom: -1px; right: -1px; top: auto; border-left: none; border-top: none; }

.viz-label {
  position: absolute;
  top: 14px;
  left: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.viz-label-right {
  position: absolute;
  top: 14px;
  right: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
}

.viz-canvas-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 160px;
  overflow-x: auto;
  padding: 24px 0;
}

.viz-caption {
  text-align: center;
  margin-top: 24px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 14px;
  color: var(--ink-muted);
}
.viz-caption .fig {
  font-family: 'JetBrains Mono', monospace;
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  margin-right: 8px;
}

/* ─── Stack Viz ─── */
.st-outer {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  padding: 20px 0 40px;
}

.st-container {
  position: relative;
  width: 108px;
  height: 380px;
}

.st-track {
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  height: 100%;
  border-left: 1.5px solid var(--ink);
  border-right: 1.5px solid var(--ink);
  border-bottom: 3px double var(--ink);
}

.st-cell {
  position: absolute;
  left: 8px;
  right: 8px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 18px;
  color: var(--ink);
  background: var(--cream);
  border: 1.5px solid var(--ink);
  transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
  animation: stackPush 0.4s ease;
}

.st-cell.hl {
  background: var(--accent);
  color: var(--cream);
  border-color: var(--accent);
  transform: translateX(6px);
  box-shadow: -4px 0 0 var(--ink);
}

.st-cell.top-mark::after {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px;
  height: 2px;
  background: var(--accent);
}

@keyframes stackPush {
  from { opacity: 0; transform: translateY(-24px) scale(0.88); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.st-idx {
  position: absolute;
  left: calc(100% + 10px);
  width: 40px;
  height: 42px;
  display: flex;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.st-base-label {
  position: absolute;
  left: 0; right: 0;
  bottom: -28px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
}

.st-top-ptr {
  position: absolute;
  right: calc(100% + 8px);
  height: 42px;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.st-top-ptr-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--accent);
}
.st-top-ptr-line {
  width: 30px;
  height: 1.5px;
  background: var(--accent);
  position: relative;
}
.st-top-ptr-line::after {
  content: '';
  position: absolute;
  right: -1px;
  top: -4px;
  width: 0; height: 0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-left: 8px solid var(--accent);
}

.st-empty-ptr .st-top-ptr-text { color: var(--ink-muted); }
.st-empty-ptr .st-top-ptr-line { background: var(--ink-muted); }
.st-empty-ptr .st-top-ptr-line::after { border-left-color: var(--ink-muted); }

.st-meta {
  position: absolute;
  left: calc(100% + 70px);
  top: 0;
  width: 180px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  text-transform: uppercase;
  line-height: 1.9;
}
.st-meta .val {
  color: var(--ink);
  font-weight: 500;
}
.st-meta .val.accent { color: var(--accent); }
.st-meta hr {
  border: none;
  border-top: 1px solid var(--line-soft);
  margin: 10px 0;
}

.st-empty-note {
  position: absolute;
  left: 0; right: 0;
  top: 45%;
  text-align: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
  pointer-events: none;
}

/* ─── Queue (Circular) Viz ─── */
.qu-outer {
  width: 100%;
  padding: 30px 20px 50px;
  display: flex;
  justify-content: center;
}

.qu-container {
  position: relative;
  padding: 48px 0 60px;
}

.qu-cells {
  display: flex;
  gap: 4px;
  position: relative;
}

.qu-cell-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 62px;
}

.qu-cell {
  width: 62px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 18px;
  color: var(--ink);
  background: var(--cream);
  border: 1.5px solid var(--ink);
  transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.3s ease, color 0.3s ease;
}
.qu-cell.empty {
  border-style: dashed;
  border-color: var(--line);
  color: var(--line);
  background: transparent;
}
.qu-cell.empty::before { content: '—'; }
.qu-cell.hl {
  background: var(--accent);
  color: var(--cream);
  border-color: var(--accent);
  transform: translateY(-6px);
  box-shadow: 0 4px 0 var(--ink);
}
.qu-cell.fresh {
  animation: cellEnter 0.35s ease;
}

@keyframes cellEnter {
  from { opacity: 0; transform: translateY(-18px) scale(0.85); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.qu-idx {
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
}

.qu-ptr {
  position: absolute;
  top: -34px;
  width: 62px;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--accent);
  transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
.qu-ptr.rear { color: var(--ink); }
.qu-ptr-text { margin-bottom: 4px; }
.qu-ptr-arrow {
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 10px solid var(--accent);
}
.qu-ptr.rear .qu-ptr-arrow { border-top-color: var(--ink); }

.qu-ptr.overlap {
  font-size: 10px;
}
.qu-ptr.overlap .qu-ptr-text {
  display: flex;
  gap: 6px;
}
.qu-ptr.overlap .qu-ptr-text span:first-child { color: var(--accent); }
.qu-ptr.overlap .qu-ptr-text span:last-child { color: var(--ink); }
.qu-ptr.overlap .qu-ptr-arrow {
  border-top-color: var(--ink-soft);
}

.qu-wrap-svg {
  position: absolute;
  left: 0; right: 0;
  bottom: 0;
  height: 46px;
  overflow: visible;
  pointer-events: none;
}
.qu-wrap-svg path {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.2;
  stroke-dasharray: 4 3;
}
.qu-wrap-svg text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  fill: var(--accent);
  text-transform: uppercase;
}

.qu-status {
  display: flex;
  justify-content: center;
  gap: 28px;
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
}
.qu-status .pill {
  padding: 5px 10px;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  background: var(--cream);
}
.qu-status .pill.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-faded);
}
.qu-status .pill.full {
  border-color: var(--ink);
  color: var(--ink);
  background: var(--cream-dark);
}

/* ─── 2D Array Viz ─── */
.a2-outer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 44px;
  padding: 12px 0;
}

.a2-grid-wrap {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.a2-col-labels {
  display: grid;
  margin-left: 28px;
}
.a2-col-labels span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  text-align: center;
  text-transform: uppercase;
  padding-bottom: 6px;
}

.a2-grid-rowwise {
  display: flex;
  flex-direction: column;
}

.a2-row-block {
  display: flex;
  align-items: center;
}

.a2-row-label {
  width: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  text-align: right;
  padding-right: 8px;
  text-transform: uppercase;
}

.a2-row {
  display: flex;
  gap: 0;
}

.a2-cell {
  width: 64px;
  height: 52px;
  border: 1px solid var(--ink);
  margin: -0.5px 0 0 -0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 17px;
  color: var(--ink);
  background: var(--cream);
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
}
.a2-cell:hover {
  background: var(--cream-dark);
}
.a2-cell.hl {
  background: var(--accent);
  color: var(--cream);
  border-color: var(--accent);
  z-index: 2;
  box-shadow: 0 4px 0 var(--ink);
  transform: translateY(-4px);
}
.a2-cell.trace {
  background: var(--accent-faded);
  color: var(--ink);
}
.a2-cell-idx {
  position: absolute;
  top: 2px;
  left: 4px;
  font-size: 8px;
  letter-spacing: 0.05em;
  color: var(--ink-muted);
  opacity: 0.7;
}
.a2-cell.hl .a2-cell-idx { color: rgba(241,234,218,0.7); }

.a2-linear-block {
  width: 100%;
  max-width: 720px;
}

.a2-linear-title {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-muted);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line-soft);
}
.a2-linear-title .mode-toggle {
  display: flex;
  gap: 2px;
}
.a2-linear-title .mode-toggle button {
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 0.14em;
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 4px 10px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s ease;
}
.a2-linear-title .mode-toggle button.active {
  background: var(--ink);
  color: var(--cream);
}
.a2-linear-title .mode-toggle button:not(.active):hover {
  background: var(--cream-dark);
}

.a2-linear-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
}
.a2-linear-cell {
  min-width: 54px;
  height: 46px;
  border: 1px solid var(--ink);
  margin: -0.5px 0 0 -0.5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
  background: var(--cream);
  transition: all 0.25s ease;
  position: relative;
}
.a2-linear-cell .k {
  position: absolute;
  top: 2px;
  font-size: 8px;
  letter-spacing: 0.05em;
  color: var(--ink-muted);
}
.a2-linear-cell.hl {
  background: var(--accent);
  color: var(--cream);
  border-color: var(--accent);

        /* ═════════════════════════════════════════════════════════════════════
           Helper · operation log
           ═════════════════════════════════════════════════════════════════════ */
        function useLog() {
            const [log, setLog] = useState([]);
            const idRef = useRef(0);
            const push = useCallback((msg, complexity = '—', kind = 'success') => {
                const now = new Date();
                const t = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                setLog(prev => [{ id: ++idRef.current, t, msg, complexity, kind }, ...prev].slice(0, 30));
            }, []);
            const clear = useCallback(() => setLog([]), []);
            return [log, push, clear];
        }

        function LogPanel({ log, onClear, num }) {
            return (
                <div className="log-block">
                    <div className="log-title">
                        <span><span className="num">{num}</span> &nbsp;OPERATION · LOG</span>
                        <span className="act" onClick={onClear}>[ CLEAR ]</span>
                    </div>
                    <div className="log-list">
                        {log.length === 0 ? (
                            <div className="log-empty">— no entries yet —</div>
                        ) : log.map(e => (
                            <div key={e.id} className={`log-item ${e.kind}`}>
                                <span className="t">{e.t}</span>
                                <span className="msg">{e.msg}</span>
                                <span className="c">{e.complexity}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        /* ═════════════════════════════════════════════════════════════════════
           Specimen 01 · Stack  (栈)
           ═════════════════════════════════════════════════════════════════════ */
        const ST_CAPACITY = 8;
        const ST_CELL_H = 42;
        const ST_GAP = 2;

        function StackModule() {
            const idRef = useRef(100);
            const [items, setItems] = useState(() =>
                [42, 17, 89].map(v => ({ id: ++idRef.current, value: v }))
            );
            const [hl, setHl] = useState(null);
            const [log, pushLog, clearLog] = useLog();

            const [valIn, setValIn] = useState('');
            const [searchIn, setSearchIn] = useState('');

            const parsedVal = () => {
                const v = parseInt(valIn, 10);
                return Number.isNaN(v) ? Math.floor(Math.random() * 99) + 1 : v;
            };

            const flash = (idx, ms = 1200) => {
                setHl(idx);
                setTimeout(() => setHl(null), ms);
            };

            const push = () => {
                if (items.length >= ST_CAPACITY) {
                    pushLog(`push × 栈满溢出 stack overflow · 容量 ${ST_CAPACITY}`, '—', 'error');
                    return;
                }
                const v = parsedVal();
                const newItem = { id: ++idRef.current, value: v };
                setItems(prev => [...prev, newItem]);
                pushLog(`push · 压入 ${v} → top=[${items.length}]`, 'O(1)', 'success');
                flash(items.length);
            };

            const pop = () => {
                if (items.length === 0) {
                    pushLog(`pop × 空栈 stack underflow`, '—', 'error');
                    return;
                }
                const topIdx = items.length - 1;
                const v = items[topIdx].value;
                setHl(topIdx);
                setTimeout(() => {
                    setItems(prev => prev.slice(0, -1));
                    setHl(null);
                }, 240);
                pushLog(`pop · 弹出 ${v} ← top=[${topIdx}]`, 'O(1)', 'success');
            };

            const peek = () => {
                if (items.length === 0) {
                    pushLog(`peek × 空栈无栈顶`, '—', 'error');
                    return;
                }
                const topIdx = items.length - 1;
                pushLog(`peek · 栈顶 = ${items[topIdx].value} · 不改变结构`, 'O(1)', 'info');
                flash(topIdx);
            };

            const search = (val) => {
                const target = parseInt(val, 10);
                if (Number.isNaN(target)) {
                    pushLog(`search × 请输入数值`, '—', 'error');
                    return;
                }
                if (items.length === 0) {
                    pushLog(`search × 空栈`, '—', 'error');
                    return;
                }
                // 从栈顶向栈底扫描，体现栈的后入先出访问顺序
                let cursor = items.length - 1;
                let steps = 0;
                const step = () => {
                    steps += 1;
                    if (cursor < 0) {
                        pushLog(`search ${target} × 未找到 · 扫描 ${steps - 1} 次`, 'O(n)', 'info');
                        setHl(null);
                        return;
                    }
                    setHl(cursor);
                    if (items[cursor].value === target) {
                        pushLog(`search ${target} ✓ 位于 [${cursor}] · 距栈顶 ${items.length - 1 - cursor}`, 'O(n)', 'success');
                        setTimeout(() => setHl(null), 800);
                        return;
                    }
                    cursor -= 1;
                    setTimeout(step, 240);
                };
                step();
            };

            const clear = () => {
                if (items.length === 0) {
                    pushLog(`clear · 栈已为空`, '—', 'info');
                    return;
                }
                setItems([]);
                pushLog(`clear · 整栈清空 · 丢弃 ${items.length} 个元素`, 'O(1)', 'success');
            };

            const reset = () => {
                setItems([42, 17, 89].map(v => ({ id: ++idRef.current, value: v })));
                pushLog(`reset · 恢复初始状态`, '—', 'info');
            };

            const topIdx = items.length - 1;
            const topValue = topIdx >= 0 ? items[topIdx].value : '∅';

            return (
                <>

                        <aside className="module-intro-side">
                            <div><strong>SPECIMEN</strong> 01 / 03</div>
                            <div><strong>TYPE</strong> LIFO</div>

                            <div><strong>CAPACITY</strong> {ST_CAPACITY}</div>

                        </aside>

                            <p>栈是一种只允许在一端进行操作的线性表——入、出、窥视皆限于"栈顶"一处。这种克制反而使它格外清晰：每一次 push 都压在最上，每一次 pop 都卸下最上。这便是"后进先出"（LIFO）的古老契约。</p>
                            <p>函数调用、表达式求值、回溯搜索——几乎任何需要"暂存 · 回退"的场景背后都有它的身影。它以一种约束换来了秩序的明朗：凡进入的，皆将逆序离开。</p>
                        </div>
                        <aside className="module-intro-side" style={{ textAlign: 'right' }}>
                            <div><strong>PUSH</strong> O(1)</div>
                            <div><strong>POP</strong> O(1)</div>
                            <div><strong>PEEK</strong> O(1)</div>
                            <div><strong>SEARCH</strong> O(n)</div>
                            <div><strong>TOP</strong> <span style={{ color: 'var(--accent)' }}>{topValue}</span></div>
                        </aside>
                    </section>

                    <section className="viz-panel">
                        <span className="viz-corner bl" />
                        <span className="viz-corner br" />
                        <span className="viz-label">FIG. 01 · VERTICAL SPECIMEN</span>
                        <span className="viz-label-right">
                            TOP = [{topIdx >= 0 ? topIdx : '∅'}] · {items.length} / {ST_CAPACITY}
                        </span>

                        <div className="viz-canvas-wrap">
                            <div className="st-outer">
                                <div className="st-container">
                                    {/* 栈体三壁 */}
                                    <div className="st-track" />

                                    {/* 空栈提示 */}
                                    {items.length === 0 && (
                                        <div className="st-empty-note">— 空栈 · stack is empty —</div>
                                    )}

                                    {/* 栈顶指针 */}
                                    <div
                                        className={`st-top-ptr ${items.length === 0 ? 'st-empty-ptr' : ''}`}
                                        style={{
                                            bottom: items.length === 0
                                                ? '0px'
                                                : `${(items.length - 1) * (ST_CELL_H + ST_GAP)}px`
                                        }}
                                    >
                                        <span className="st-top-ptr-text">TOP</span>
                                        <span className="st-top-ptr-line" />
                                    </div>

                                    {/* 栈单元 */}
                                    {items.map((it, idx) => (

                                    {items.map((it, idx) => (

                                    {/* 右侧元数据说明 */}
                                    <div className="st-meta">

                                        <hr />
                                        <div>§ SYMBOL</div>
                                        <div style={{ lineHeight: 1.8 }}>
                                            <div>+ &nbsp;push</div>
                                            <div>− &nbsp;pop</div>
                                            <div>◎ &nbsp;peek</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="viz-caption">
                            <span className="fig">FIG. 01</span>
                            <span className="italic">单端开口的容器——一切进出只在栈顶发生。</span>
                        </div>
                    </section>

                    <section className="controls-grid">
                        <div className="control-block">
                            <div className="control-block-title">
                                <span><span className="num">§1</span> &nbsp;OPERATIONS</span>
                                <span>INPUTS ↓</span>
                            </div>

                            <div className="input-row">
                                <label>VALUE</label>
                                <input
                                    className="lab-input"
                                    value={valIn}
                                    onChange={e => setValIn(e.target.value)}
                                    placeholder="留空则随机"
                                />
                            </div>

                            <div style={{ height: 6 }} />

                            <div className="btn-grid cols-3">
                                <button className="lab-btn accent" onClick={push}>
                                    <span>压栈 PUSH</span><span className="sym">＋</span>
                                </button>

                                    <span>弹栈 POP</span><span className="sym">−</span>

                                <button className="lab-btn" onClick={peek}>
