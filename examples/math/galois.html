<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据结构 - 图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-900 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ==========================================================================
           伽罗瓦理论演示  ——  GALOIS THEORY · A Visual Essay
           ========================================================================== */

        const Stylesheet = () => (
            <style>{`
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

    :root {
      --parchment:        #ede1c8;
      --parchment-warm:   #e8d8b8;
      --parchment-deep:   #d8c69e;
      --ink:              #1a1410;
      --ink-soft:         #2a2218;
      --ink-muted:        #5d4f3d;
      --crimson:          #7a1f1c;
      --crimson-deep:     #4d1310;
      --gold:             #8b6914;
      --gold-warm:        #b8893d;
      --navy:             #1e2a44;
      --line:             rgba(26, 20, 16, 0.22);
      --line-soft:        rgba(26, 20, 16, 0.10);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    .galois-app {
      font-family: 'EB Garamond', 'Noto Serif SC', Georgia, serif;
      font-size: 19px;
      line-height: 1.65;
      color: var(--ink);
      background:
        radial-gradient(ellipse 1200px 800px at 20% 10%, rgba(184,137,61,0.10), transparent 60%),
        radial-gradient(ellipse 800px 600px at 80% 90%, rgba(122,31,28,0.06), transparent 60%),
        var(--parchment);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* paper grain */
    .galois-app::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 25% 30%, rgba(60,40,20,0.04) 0, transparent 2px),
        radial-gradient(circle at 70% 60%, rgba(60,40,20,0.04) 0, transparent 2px),
        radial-gradient(circle at 50% 80%, rgba(60,40,20,0.03) 0, transparent 1.5px);
      background-size: 7px 7px, 11px 11px, 13px 13px;
      opacity: 0.6;
      z-index: 0;
      mix-blend-mode: multiply;
    }

    .galois-app > * { position: relative; z-index: 1; }

    /* ---------- typography ---------- */
    h1, h2, h3, .display {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--ink);
    }
    .cn { font-family: 'Noto Serif SC', 'EB Garamond', serif; }

    .small-caps {
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-size: 0.72em;
      font-weight: 500;
      color: var(--crimson);
    }

    .ornament {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      color: var(--gold-warm);
      letter-spacing: 0.4em;
    }

    .rule {
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--line), transparent);
      margin: 2em 0;
    }
    .rule-thick {
      border: 0;
      height: 0;
      border-top: 1px solid var(--ink);
      border-bottom: 3px double var(--ink);
      padding-top: 2px;
      margin: 1.5em 0;
    }

    .math {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }
    .mathup { font-family: 'EB Garamond', Georgia, serif; font-style: normal; }

    /* ---------- reveal animation ---------- */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1); }
    .reveal.in { opacity: 1; transform: none; }
    .reveal.d1 { transition-delay: 0.12s; }
    .reveal.d2 { transition-delay: 0.24s; }
    .reveal.d3 { transition-delay: 0.36s; }
    .reveal.d4 { transition-delay: 0.48s; }

    /* ---------- nav ---------- */
    .nav {
      position: fixed;
      top: 50%;
      right: 28px;
      transform: translateY(-50%);
      z-index: 50;
      display: flex; flex-direction: column; gap: 14px;
      background: rgba(237, 225, 200, 0.55);
      backdrop-filter: blur(6px);
      padding: 18px 14px;
      border: 1px solid var(--line);
      border-radius: 2px;
    }
    .nav button {
      background: none; border: none; cursor: pointer; padding: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-muted);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      transition: color 0.3s;
      text-align: center;
    }
    .nav button:hover, .nav button.active { color: var(--crimson); }
    .nav button.active::before {
      content: '·';
      display: block;
      color: var(--crimson);
      font-size: 24px;
      line-height: 0.4;
      margin-bottom: 4px;
      transform: rotate(180deg);
    }
    @media (max-width: 900px) { .nav { display: none; } }

    /* ---------- containers ---------- */
    section.chapter {
      max-width: 1080px;
      margin: 0 auto;
      padding: 8vh 32px;
      position: relative;
    }
    .chapter-num {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--crimson);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .chapter-title {
      font-size: clamp(36px, 5vw, 58px);
      line-height: 1.05;
      margin: 0 0 8px 0;
      font-weight: 500;
    }
    .chapter-title em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 400;
      color: var(--crimson);
    }
    .chapter-sub {
      font-style: italic;
      color: var(--ink-muted);
      max-width: 56ch;
      margin: 12px 0 36px 0;
    }

    /* ---------- HERO ---------- */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 32px;
      max-width: 1080px;
      margin: 0 auto;
      position: relative;
    }
    .hero-meta {
      display: flex; justify-content: space-between; align-items: flex-end;
      padding-top: 32px;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 18px;
      margin-bottom: 8vh;
    }
    .hero-meta .left { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--ink); }
    .hero-meta .right { font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-muted); }

    .hero-title {
      font-size: clamp(56px, 9vw, 124px);
      line-height: 0.95;
      margin: 0;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .hero-title .line2 {
      display: block;
      font-style: italic;
      font-weight: 300;
      color: var(--crimson);
      padding-left: 1.2em;
    }
    .hero-title .line3 {
      display: block;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.42em;
      letter-spacing: 0.02em;
      color: var(--ink);
      margin-top: 0.6em;
      font-weight: 400;
    }

    .hero-question {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.5;
      max-width: 640px;
      margin-top: 6vh;
      color: var(--ink-soft);
      border-left: 2px solid var(--crimson);
      padding-left: 28px;
    }
    .hero-question .cn { font-style: normal; font-weight: 400; }

    .hero-foot {
      margin-top: auto;
      padding: 32px 0 24px 0;
      display: flex; justify-content: space-between; align-items: flex-end;
      font-size: 13px; color: var(--ink-muted);
      letter-spacing: 0.18em; text-transform: uppercase;
      border-top: 1px solid var(--line);
    }
    .scroll-cue {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      letter-spacing: 0.28em;
      font-size: 12px;
      color: var(--crimson);
      text-transform: none;
    }
    .scroll-cue::after {
      content: '';
      display: block;
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, var(--crimson), transparent);
      margin: 16px auto 0;
      transform: rotate(180deg);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { opacity: 0.3; transform: rotate(180deg) scaleY(0.7); transform-origin: top; }
      50%     { opacity: 1;   transform: rotate(180deg) scaleY(1); }
    }

    /* ---------- TIMELINE ---------- */
    .timeline {
      position: relative;
      margin: 60px 0;
      padding-left: 0;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 80px; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--line) 5%, var(--line) 95%, transparent);
    }
    .tl-event {
      display: grid;
      grid-template-columns: 80px 28px 1fr;
      gap: 28px;
      margin-bottom: 56px;
      cursor: pointer;
      align-items: start;
    }
    .tl-year {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--crimson);
      text-align: right;
      padding-top: 4px;
      font-feature-settings: "lnum" 1;
    }
    .tl-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      background: var(--parchment);
      margin: 12px auto 0;
      transition: all 0.3s;
    }
    .tl-event:hover .tl-dot {
      background: var(--crimson);
      border-color: var(--crimson);
      transform: scale(1.2);
    }
    .tl-event.active .tl-dot {
      background: var(--crimson);
      border-color: var(--crimson);
      box-shadow: 0 0 0 4px rgba(122,31,28,0.18);
    }
    .tl-content { padding-top: 0; }
    .tl-figure { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; color: var(--ink); margin: 0 0 4px 0; }
    .tl-figure em { font-style: italic; color: var(--ink-muted); font-weight: 400; font-size: 0.7em; margin-left: 8px; letter-spacing: 0.05em; }
    .tl-headline { font-style: italic; color: var(--ink-soft); margin: 0 0 8px 0; }
    .tl-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.6s cubic-bezier(.2,.7,.2,1), opacity 0.4s;
      opacity: 0;
    }
    .tl-event.active .tl-body { max-height: 600px; opacity: 1; padding-top: 12px; }
    .tl-body p { margin: 0 0 10px 0; }
    .tl-body .formula {
      background: rgba(255,250,235,0.6);
      border-left: 2px solid var(--gold-warm);
      padding: 14px 18px;
      margin: 14px 0;
      font-size: 18px;
      overflow-x: auto;
    }

    /* ---------- formula gallery ---------- */
    .formula-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      margin-top: 40px;
    }
    .formula-card {
      background: rgba(255,250,235,0.4);
      border: 1px solid var(--line);
      padding: 32px 28px;
      position: relative;
      transition: transform 0.4s ease;
    }
    .formula-card:hover { transform: translateY(-4px); }
    .formula-card .deg {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--crimson);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .formula-card h3 {
      font-size: 26px; margin: 6px 0 18px 0; font-weight: 500;
    }
    .formula-card .eqn {
      font-size: 17px;
      line-height: 1.9;
      color: var(--ink-soft);
      min-height: 100px;
    }
    .formula-card .meta {
      font-style: italic; font-size: 14px; color: var(--ink-muted);
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line-soft);
    }
    .formula-card.unsolvable {
      background: rgba(122,31,28,0.06);
      border: 1px solid rgba(122,31,28,0.3);
    }
    .formula-card.unsolvable .deg { color: var(--crimson-deep); }

    /* ---------- math notation ---------- */
    .frac {
      display: inline-flex;
      flex-direction: column;
      vertical-align: middle;
      text-align: center;
      margin: 0 0.15em;
      font-size: 0.92em;
    }
    .frac .num { border-bottom: 1px solid currentColor; padding: 0 0.3em; }
    .frac .den { padding: 0 0.3em; }
    .sqrt {
      display: inline-flex; align-items: center;
    }
    .sqrt-sym {
      font-style: normal;
      margin-right: -2px;
    }
    .sqrt-content {
      border-top: 1px solid currentColor;
      padding-top: 1px;
      padding-left: 2px;
      padding-right: 2px;
      margin-top: -3px;
    }

    /* ---------- permutation playground ---------- */
    .perm-stage {
      background: rgba(255,250,235,0.5);
      border: 1px solid var(--line);
      padding: 32px;
      margin-top: 32px;
    }
    .perm-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      align-items: center;
    }
    .perm-controls .label {
      font-style: italic;
      color: var(--ink-muted);
      font-size: 15px;
      margin-right: 6px;
    }
    .pill {
      background: var(--parchment);
      border: 1px solid var(--ink);
      padding: 8px 16px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.2s;
    }
    .pill:hover { background: var(--ink); color: var(--parchment); }
    .pill.active { background: var(--ink); color: var(--parchment); }

    .root-row {
      display: flex; gap: 0;
      justify-content: center;
      align-items: center;
      margin: 28px 0;
      min-height: 130px;
      position: relative;
      overflow-x: auto;
      padding: 6px 0;
    }
    .root-row::-webkit-scrollbar { height: 4px; }
    .root-row::-webkit-scrollbar-thumb { background: var(--line); }
    .root-bead {
      width: 76px; height: 76px;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--ink);
      border-radius: 50%;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 30px;
      background: var(--parchment-warm);
      transition: transform 0.7s cubic-bezier(.4,.1,.2,1.2), background 0.4s;
      position: relative;
    }
    .root-bead .sub {
      font-size: 0.45em;
      vertical-align: sub;
      margin-left: -2px;
    }
    .root-bead.highlight { background: var(--crimson); color: var(--parchment); border-color: var(--crimson); }

    .perm-info {
      text-align: center;
      margin-top: 18px;
      font-style: italic;
      color: var(--ink-muted);
    }
    .perm-info strong {
      font-family: 'Cormorant Garamond', serif;
      font-style: normal;
      color: var(--ink);
      font-size: 1.2em;
      margin-right: 6px;
    }

    .group-orders {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-top: 32px;
    }
    .order-cell {
      text-align: center;
      padding: 18px 8px;
      background: rgba(255,250,235,0.4);
      border: 1px solid var(--line);
      transition: all 0.3s;
      cursor: pointer;
    }
    .order-cell:hover { background: rgba(122,31,28,0.06); border-color: var(--crimson); }
    .order-cell.danger { background: rgba(122,31,28,0.10); border-color: var(--crimson); }
    .order-cell .gp {
      font-family: 'EB Garamond', serif; font-style: italic; font-size: 24px;
    }
    .order-cell .num { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-top: 4px; color: var(--ink); }
    .order-cell.danger .num { color: var(--crimson); }
    .order-cell .lbl { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 6px; font-style: italic; }

    /* ---------- group lattice ---------- */
    .lattice-stage {
      background: rgba(255,250,235,0.5);
      border: 1px solid var(--line);
      padding: 36px 24px;
      margin-top: 32px;
    }
    .lattice-flex {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-bottom: 32px;
    }
    @media (max-width: 700px) { .lattice-flex { grid-template-columns: 1fr; } }
    .lattice-panel {
      text-align: center;
    }
    .lattice-panel h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      margin: 0 0 4px 0;
    }
    .lattice-panel .verdict {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 12px;
      padding: 4px 14px;
      margin-bottom: 18px;
    }
    .verdict.solvable { background: rgba(139,105,20,0.15); color: var(--gold); border: 1px solid var(--gold); }
    .verdict.notsolvable { background: rgba(122,31,28,0.10); color: var(--crimson); border: 1px solid var(--crimson); }

    /* ---------- final theorem ---------- */
    .theorem-box {
      background: var(--ink);
      color: var(--parchment);
      padding: 56px 48px;
      margin-top: 48px;
      position: relative;
    }
    .theorem-box::before, .theorem-box::after {
      content: '';
      position: absolute;
      left: 8px; right: 8px;
      height: 1px;
      background: var(--gold-warm);
    }
    .theorem-box::before { top: 8px; }
    .theorem-box::after { bottom: 8px; }
    .theorem-box .label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold-warm);
      font-size: 13px;
      margin-bottom: 18px;
    }
    .theorem-box h2 {
      color: var(--parchment);
      font-size: 36px;
      margin: 0 0 18px 0;
      font-weight: 500;
    }
    .theorem-box .body {
      font-size: 19px;
      line-height: 1.8;
      max-width: 64ch;
    }
    .theorem-box .body em { color: var(--gold-warm); font-style: italic; }
    .theorem-box .signature {
      margin-top: 32px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--gold-warm);
      letter-spacing: 0.15em;
    }

    /* ---------- biography ---------- */
    .bio-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 48px;
      margin-top: 40px;
      align-items: start;
    }
    @media (max-width: 720px) { .bio-grid { grid-template-columns: 1fr; } }
    .bio-portrait {
      aspect-ratio: 3 / 4;
      background: var(--parchment-deep);
      border: 1px solid var(--line);
      padding: 16px;
      position: relative;
    }
    .bio-portrait .name {
      position: absolute;
      bottom: 16px; left: 16px; right: 16px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--ink);
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }
    .bio-portrait .dates {
      font-size: 13px; letter-spacing: 0.18em; color: var(--ink-muted); margin-top: 4px;
    }

    .bio-text p { margin: 0 0 16px 0; }
    .bio-text p::first-letter {
      font-family: 'Cormorant Garamond', serif;
    }
    .bio-text .pullquote {
      border-left: 2px solid var(--crimson);
      padding-left: 24px;
      margin: 24px 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 22px;
      color: var(--ink-soft);
      line-height: 1.5;
    }
    .bio-text .pullquote .attr {
      display: block;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 12px;
      font-style: normal;
    }

    /* ---------- footer ---------- */
    .colophon {
      max-width: 1080px;
      margin: 12vh auto 0;
      padding: 48px 32px 64px;
      border-top: 3px double var(--ink);
      text-align: center;
    }
    .colophon .ornament { font-size: 24px; }
    .colophon p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--ink-muted);
      font-size: 16px;
      max-width: 56ch;
      margin: 16px auto 8px;
      line-height: 1.6;
    }

    /* drop cap */
    .dropcap::first-letter {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.4em;
      float: left;
      line-height: 0.85;
      padding: 4px 12px 0 0;
      color: var(--crimson);
      font-weight: 500;
    }

    /* ================================================================
       新增：初学者展开讲解的样式
       ================================================================ */

    /* —— 章节副标题（小节标题） —— */
    .subhead {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;

                        if (e.isIntersecting) {
                            e.target.classList.add('in');
                            io.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.12 });
                els.forEach(el => io.observe(el));
                return () => io.disconnect();
            }, []);

                                {/* cravat */}
                                <path d="M55 96 q5 6 10 0 l-2 6 h-6 z" fill="var(--crimson)" stroke="var(--crimson)" />
                            </g>
                        </svg>
                        <div className="name">
                            Évariste Galois
                            <div className="dates">1811 — 1832</div>
                        </div>
                    </div>

                    <div className="bio-text cn" style={{ fontSize: 18 }}>
                        <p>
                            伽罗瓦生于巴黎南郊。少年早慧，却两次落榜于巴黎理工——传说面试时
                            他不耐烦了，把黑板擦砸向考官。他厌烦平庸，行事激烈，
                            政治上是激进的共和派，因此屡遭逮捕。
                        </p>

                        <div className="pullquote">
                            "我没有时间了。"
                            <span className="attr">— 1832 年 5 月 29 日 · 决斗前夜的信</span>
                        </div>

                        <p>
                            他在 16 岁前后开始构想群与置换的语言；
                            论文寄给法兰西科学院，被柯西"暂存"，不久阴差阳错地遗失。
                            再投，傅立叶审稿期间去世，论文随之消散。
                            最后一份手稿，被泊松评为"<em>不可理解</em>"。
                        </p>

                        <p>
                            1832 年 5 月 29 日深夜，伽罗瓦匆匆把毕生工作写在数页信纸上，
                            边页处反复涂写"<em>我没有时间</em>"。
                            翌晨于决斗中腹部中弹，两日后亡。
                        </p>

                        <p>
                            他寄给朋友 Auguste Chevalier 的信件，便是后世群论的源头。
                            十四年后（1846），刘维尔将其整理出版——人类终于读懂这个 20 岁青年留下的世界。
                        </p>

                        <hr className="rule" />

                        <p style={{ fontStyle: 'italic', color: 'var(--ink-muted)' }}>
                            他证明的，不只是"五次方程没有公式"。
                            他奠定的，是抽象代数全部的语法。
                            一切现代数学——从晶体到密码学，从粒子物理到拓扑——都说着<strong>群</strong>的语言。
                        </p>
                    </div>
                </div>
            </section>
        );

        /* ===========================================================
           Nav
           =========================================================== */
        const SECTIONS = [
            { id: 'hero', label: 'Prologue' },
            { id: 'quest', label: 'Quest' },
            { id: 'formulas', label: 'Formulas' },
            { id: 'permutations', label: 'Symmetry' },
            { id: 'solvable', label: 'Solvable' },
            { id: 'theorem', label: 'Theorem' },
            { id: 'galois', label: 'Galois' },
        ];

        const Nav = () => {
            const [active, setActive] = useState('hero');
            useEffect(() => {
                const onScroll = () => {
                    let cur = 'hero';
                    for (const s of SECTIONS) {
                        const el = document.getElementById(s.id);
                        if (el && el.getBoundingClientRect().top < 220) cur = s.id;
                    }
                    setActive(cur);
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return (
                <nav className="nav">
                    {SECTIONS.map(s => (
                        <button
                            key={s.id}
                            className={active === s.id ? 'active' : ''}
                            onClick={() => document.getElementById(s.id)?.scrollIntoView({ behavior: 'smooth' })}
                        >{s.label}</button>
                    ))}
                </nav>
            );
        };

        /* ===========================================================
           Colophon (footer)
           =========================================================== */
        const Colophon = () => (
            <footer className="colophon">
                <div className="ornament">❦ ❦ ❦</div>
                <p>
                    An interactive essay on Galois Theory, set in EB Garamond &amp; Cormorant.
                </p>
                <p style={{ fontSize: 13, marginTop: 24, letterSpacing: '0.18em', color: 'var(--ink-muted)' }}>
                    FINIS ·&nbsp; <span style={{ color: 'var(--crimson)' }}>x⁵ + ax + b ≠ 0 by radicals</span>
                </p>
            </footer>
        );

        /* ===========================================================
           Main
           =========================================================== */
        function App() {
            useReveal();
            return (
                <div className="galois-app">
                    <Stylesheet />
                    <Nav />
                    <Hero />
                    <Timeline />
                    <FormulaGallery />
                    <Permutations />
                    <Solvable />
                    <Theorem />
                    <Bio />
                    <Colophon />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>

</html>
